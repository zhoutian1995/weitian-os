<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sticker Spin Demo</title>
<style>
body {
  background: #2B7FD8;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
}
.sticker {
  width: 280px;
  cursor: pointer;
  perspective: 800px;
}
.sticker img {
  width: 100%;
  height: auto;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.sticker.spinning img {
  transform: rotateY(360deg);
}
.hint {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.6);
  font-family: -apple-system, sans-serif;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="sticker" id="sticker">
  <img src="buer-sticker.png" alt="不二">
</div>
<div class="hint">点击小人试试</div>
<script>
const sticker = document.getElementById('sticker');
sticker.addEventListener('click', function() {
  if (sticker.classList.contains('spinning')) return;
  sticker.classList.add('spinning');
  setTimeout(() => {
    sticker.classList.remove('spinning');
    // Reset transform so it can spin again
    sticker.querySelector('img').style.transform = '';
  }, 850);
});
</script>
</body>
</html>
