<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Desktop Stars + Click Star Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #2B7FD8;
  min-height: 100vh;
  overflow: hidden;
  cursor: default;
  position: relative;
}

/* === Wallpaper stars (identical to index.html) === */
.wp-star {
  position: absolute;
  color: #F4D758;
  font-size: var(--size, 14px);
  opacity: var(--op, 0.7);
  --push: translate(0, 0) scale(1);
  animation: wp-twinkle var(--dur, 3s) ease-in-out infinite, wp-wobble var(--wdur, 4s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  transform: var(--push);
  transition: transform 0.3s ease-out;
  pointer-events: none;
  z-index: 0;
}
.wp-star.disturbed {
  animation-play-state: paused;
  opacity: 1 !important;
  transform: var(--push);
  transition: transform 0.1s ease-out;
}
@keyframes wp-twinkle {
  0%, 100% { opacity: var(--op, 0.7); }
  50% { opacity: calc(var(--op, 0.7) * 0.25); }
}
@keyframes wp-wobble {
  0%, 100% { transform: var(--push) rotate(0deg) translateX(0); }
  25% { transform: var(--push) rotate(10deg) translateX(2px); }
  75% { transform: var(--push) rotate(-10deg) translateX(-2px); }
}

/* === Click-generated star (same ✦, same color) === */
.click-star {
  position: fixed;
  pointer-events: none;
  color: #F4D758;
  z-index: 9999;
  animation: starPop 0.7s ease-out forwards;
}
@keyframes starPop {
  0% { transform: scale(0) rotate(0deg); opacity: 1; }
  30% { transform: scale(1.4) rotate(15deg); opacity: 1; }
  60% { transform: scale(1) rotate(-5deg); opacity: 0.8; }
  100% { transform: scale(0.6) rotate(0deg); opacity: 0; }
}

.hint {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.4);
  font-family: -apple-system, sans-serif;
  font-size: 13px;
}
</style>
</head>
<body>

<!-- Wallpaper stars -->
<span class="wp-star" style="top:3%;left:5%;--size:12px;--op:0.75;--dur:2.4s;--wdur:3.2s;--delay:0s;">✦</span>
<span class="wp-star" style="top:2%;left:15%;--size:8px;--op:0.5;--dur:3.1s;--wdur:4.3s;--delay:0.4s;">✦</span>
<span class="wp-star" style="top:5%;left:25%;--size:16px;--op:0.8;--dur:2.7s;--wdur:3.5s;--delay:0.8s;">✦</span>
<span class="wp-star" style="top:8%;left:35%;--size:6px;--op:0.4;--dur:3.6s;--wdur:4.8s;--delay:1.2s;">✦</span>
<span class="wp-star" style="top:12%;left:45%;--size:11px;--op:0.65;--dur:2.9s;--wdur:3.9s;--delay:0.2s;">✦</span>
<span class="wp-star" style="top:6%;left:55%;--size:14px;--op:0.7;--dur:2.5s;--wdur:3.3s;--delay:0.6s;">✦</span>
<span class="wp-star" style="top:15%;left:65%;--size:9px;--op:0.5;--dur:3.3s;--wdur:4.5s;--delay:1.5s;">✦</span>
<span class="wp-star" style="top:20%;left:75%;--size:18px;--op:0.85;--dur:2.3s;--wdur:3.1s;--delay:0.3s;">✦</span>
<span class="wp-star" style="top:25%;left:10%;--size:10px;--op:0.6;--dur:3.4s;--wdur:4.1s;--delay:0.9s;">✦</span>
<span class="wp-star" style="top:30%;left:40%;--size:7px;--op:0.45;--dur:2.8s;--wdur:3.7s;--delay:1.1s;">✦</span>
<span class="wp-star" style="top:35%;left:60%;--size:13px;--op:0.7;--dur:3.0s;--wdur:4.0s;--delay:0.5s;">✦</span>
<span class="wp-star" style="top:40%;left:20%;--size:15px;--op:0.75;--dur:2.6s;--wdur:3.4s;--delay:0.7s;">✦</span>
<span class="wp-star" style="top:50%;left:80%;--size:11px;--op:0.6;--dur:3.2s;--wdur:4.2s;--delay:1.3s;">✦</span>
<span class="wp-star" style="top:55%;left:30%;--size:8px;--op:0.5;--dur:2.9s;--wdur:3.8s;--delay:0.1s;">✦</span>
<span class="wp-star" style="top:60%;left:50%;--size:17px;--op:0.8;--dur:2.4s;--wdur:3.3s;--delay:0.4s;">✦</span>
<span class="wp-star" style="top:70%;left:70%;--size:6px;--op:0.4;--dur:3.5s;--wdur:4.6s;--delay:1.0s;">✦</span>
<span class="wp-star" style="top:75%;left:15%;--size:14px;--op:0.7;--dur:2.7s;--wdur:3.6s;--delay:0.6s;">✦</span>
<span class="wp-star" style="top:80%;left:85%;--size:10px;--op:0.55;--dur:3.1s;--wdur:4.4s;--delay:1.4s;">✦</span>
<span class="wp-star" style="top:85%;left:45%;--size:12px;--op:0.65;--dur:2.5s;--wdur:3.5s;--delay:0.8s;">✦</span>
<span class="wp-star" style="top:90%;left:25%;--size:9px;--op:0.5;--dur:3.3s;--wdur:4.0s;--delay:0.2s;">✦</span>

<div class="hint">鼠标划过 → 星星被推开 ｜ 点击 → 生成新星星</div>

<script>
// === Mouse disturbance (same as index.html) ===
(function() {
  var wpStars = document.querySelectorAll('.wp-star');
  var mx = -9999, my = -9999;
  var radius = 130;

  document.addEventListener('mousemove', function(e) {
    mx = e.clientX;
    my = e.clientY;
  });

  function updateStars() {
    wpStars.forEach(function(star) {
      var rect = star.getBoundingClientRect();
      var sx = rect.left + rect.width / 2;
      var sy = rect.top + rect.height / 2;
      var dx = sx - mx;
      var dy = sy - my;
      var dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < radius) {
        var force = (1 - dist / radius) * 20;
        var angle = Math.atan2(dy, dx);
        var pushX = Math.cos(angle) * force;
        var pushY = Math.sin(angle) * force;
        var scale = 1 + (1 - dist / radius) * 0.4;
        star.style.setProperty('--push', 'translate(' + pushX + 'px, ' + pushY + 'px) scale(' + scale + ')');
        star.classList.add('disturbed');
      } else {
        star.style.setProperty('--push', 'translate(0, 0) scale(1)');
        star.classList.remove('disturbed');
      }
    });
    requestAnimationFrame(updateStars);
  }
  requestAnimationFrame(updateStars);
})();

// === Click to create star ===
document.addEventListener('click', function(e) {
  var star = document.createElement('span');
  star.className = 'click-star';
  star.textContent = '✦';
  var size = 12 + Math.random() * 14;
  star.style.fontSize = size + 'px';
  star.style.left = (e.clientX - size / 2) + 'px';
  star.style.top = (e.clientY - size / 2) + 'px';
  document.body.appendChild(star);
  setTimeout(function() { star.remove(); }, 750);
});
</script>
</body>
</html>
