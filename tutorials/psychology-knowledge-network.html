le": "一个客服每天接无聊的投诉电话，工资还不低。他很痛苦。换到一个初创公司做技术支持，工资低但每天解决复杂问题，看到客户的感谢，反而更满足。因为后者能进入心流，前者无法。", "bookId": "flow", "keywords": ["心流"]}, {"id": "flow-in-intimacy", "point": "真正亲密的交流就是两个人一起进入心流：完全沉浸、即时反馈、相互回应", "explanation": "很多人以为亲密关系靠时间堆砌，其实最重要的是'质量'——即有多少时间你们真正在心流中交流。深度对话、共同完成一个项目、一起运动，都能制造这种心流。而刷手机、看电视一起，看似在陪伴，其实各自在自己的精神熵中。", "example": "一对夫妻每晚在沙发上各看各的手机，虽然在一起，但都很孤独。换成一起做饭、下棋、散步，边走边聊天，这时的陪伴才是真正的亲密。因为他们的注意力完全在彼此身上，即时地回应彼此。", "bookId": "flow", "keywords": ["心流", "亲密关系"]}, {"id": "thinking-system1-system2", "point": "系统1（快思考）是你的直觉，处理速度快但容易出错；系统2（慢思考）是你的理性，处理速度慢但准确。大多数人太依赖系统1", "explanation": "系统1时刻工作，根本不需要你同意就在做判断。系统2很懒惰，只有在遇到困难问题时才会启动。这导致你在日常决策中总是走捷径，犯很多可避免的错误。而且系统1一旦有了答案，系统2往往就放弃了，接受这个答案。", "example": "你在超市看到一个商品，原价100，现在打五折卖50。系统1立刻说'便宜！买！'。但系统2应该问：'这个原价是真实的吗？我真的需要这个吗？'。但系统2很累，通常会同意系统1的决定。", "bookId": "thinking-fast-slow", "keywords": ["认知偏差", "元认知"]}, {"id": "thinking-availability-heuristic", "point": "你判断一个事件的可能性，不是基于真实的概率，而是基于你能想起来的例子有多少。越容易想起来，你就觉得越常见", "explanation": "这叫'可得性启发法'。飞机失事的新闻满天飞，所以人们觉得飞行很危险。但统计上开车的死亡率远高于飞行。电视上经常报道犯罪，所以人们觉得城市很危险。这个偏差会导致你高估频繁出现在新闻中的风险，低估真实的风险。", "example": "你听到一个朋友炒股赚了大钱，突然就觉得炒股很容易赚钱。因为这个例子在脑海里太清晰了。但你没看到那些赔钱的人。如果系统2参与，你会要求数据：'到底有多少人通过炒股稳定获利？'", "bookId": "thinking-fast-slow", "keywords": ["认知偏差"]}, {"id": "thinking-anchoring", "point": "你对任何数字的判断，都会被最先听到的'锚'深刻影响。即使你知道这个数字是随意的，也无法摆脱它的影响", "explanation": "这是一个非常强大的认知偏差。即使告诉你这个数字是掷骰子得来的，无关乎实际，你的判断还是会被它锚定。这就是为什么谈薪资时，先出价的人往往赢。", "example": "商家先报价'这件衣服原价1000'，然后打折到200。你的锚是1000，所以觉得很便宜。如果它直接说200，你可能觉得贵。同样的价格，因为锚不同，你的感受就完全不同。销售员知道这个技巧，所以总是先说高价。", "bookId": "thinking-fast-slow", "keywords": ["认知偏差"]}, {"id": "thinking-confirmation-bias", "point": "一旦你形成了一个想法，你的大脑就会倾向于寻找支持这个想法的证据，忽视反对的证据", "explanation": "这叫'确认偏差'。它特别危险，因为你不是在故意欺骗自己，而是你的大脑在自动过滤信息。你看到的世界，往往是你想看的世界。", "example": "你决定了一个人很可靠。之后他的每一个小优点你都记住了，每一个缺点你都当成例外。反过来，如果你决定了某人不可靠，同样的行为，你会理解成'果然'。你其实在用选择性地看证据来维护自己的结论。", "bookId": "thinking-fast-slow", "keywords": ["认知偏差"]}, {"id": "thinking-illusion-of-understanding", "point": "大多数人都高估了自己的理解程度。你觉得你'懂'一个现象，其实你对它的了解比你想象的少很多", "explanation": "你能复述一个故事，就以为你理解了。但如果问你'为什么会这样'，你可能答不上来。大脑在玩一个把戏：给你一种'我懂了'的感觉，实际上是一种幻觉。", "example": "你看完新闻说'中美贸易战会影响经济'，感到自己理解了。但问你'具体会如何影响'，你说不清。你其实只是吸收了一些关键词，大脑就给了你'理解'的快感。这就是'理解幻觉'。", "bookId": "thinking-fast-slow", "keywords": ["认知偏差"]}, {"id": "thinking-experiencing-vs-remembering", "point": "你有两个自我：体验自我（活在当下）和记忆自我（记录和评价）。他们对幸福的定义完全不同", "explanation": "体验自我关心此刻的感受，记忆自我关心这段经历最后会得什么。一场10小时的旅行，前9小时很痛苦，最后1小时很美妙，但你对这段旅行的评价却很好——因为记忆自我用'峰值和结尾'来判断。这解释了为什么人们常常违背自己的实际体验来做决定。", "example": "你忍受一个7小时的无聊会议，最后老板表扬你。回忆这段经历时，你的评价是'不错'。但你体验自我在会议中的大部分时间其实很痛苦。你的生活决定往往受记忆自我的操纵，忽视了体验自我的实际快乐。", "bookId": "thinking-fast-slow", "keywords": ["认知偏差"]}, {"id": "maybe-dual-perspective", "point": "只有当治疗师也经历过人生危机、也在治疗师的椅子上哭过，她才能真正看见患者。治疗不是一个有答案的人教一个没答案的人", "explanation": "这是这本书最核心的洞见。作者是一个心理治疗师，同时在人生低谷时成为了患者。她发现，自己作为治疗师多年积累的技巧，在她自己陷入危机时其实帮助不大。真正帮助她的，是她的治疗师的'在场'和真实的陪伴。这改变了她对治疗本质的理解。", "example": "一个治疗师可能完美掌握所有技巧，但如果她从未真正崩溃过、从未被他人拯救过，她的同情总是隔着一层。反之，一个有过伤痛并走出来的治疗师，病人能感受到那种'你能理解，因为你也经历过'的力量。", "bookId": "maybe-talk-therapist", "keywords": ["共情", "亲密关系"]}, {"id": "maybe-resistance-to-change", "point": "人们抗拒改变的真正原因不是改变本身有多难，而是'现在的我'虽然痛苦，但至少是已知的、可控的。改变意味着未知和失去", "explanation": "很多人说'我想改变'，但当真的要改变时就退缩了。因为改变意味着失去熟悉感。即使现在很痛苦，但你已经适应了这种痛苦，你知道'这样的我'是什么样的。而改变成为新的自己，需要放弃旧的防御机制、旧的身份，这太可怕了。", "example": "一个长期抑郁的人开始心理治疗。有一段时间他开始感到好转，但随即又陷入抑郁。不是因为他不想好，而是因为健康的自己对他来说是陌生的。新的自己需要承担新的责任、新的关系、新的选择。他的无意识在说：'我宁可留在熟悉的痛苦里。'", "bookId": "maybe-talk-therapist", "keywords": ["放下抗拒"]}, {"id": "maybe-rewriting-narrative", "point": "治疗的本质是帮助你重新讲述自己的故事。同样的经历，用不同的方式讲述，就能获得完全不同的力量", "explanation": "你对自己经历的理解（叙事），决定了这个经历如何影响你。一个人可能说'我从未被好好爱过，所以我注定孤独'，也可以说'正因为爱的缺失，我学会了自己爱自己'。前者是受害者叙事，后者是成长叙事。治疗师的工作就是帮你看到，你有权利改写这个故事。", "example": "一个女人一直认为自己是'被父亲抛弃的孩子'，这个身份塑造了她所有的亲密关系——她总是过度依赖、过度讨好。治疗中，她开始重写这个故事：'我的父亲用他的方式表达了他的局限，而不是我的不值得被爱。' 这个细微的改变，让她开始用不同的方式对待自己。", "bookId": "maybe-talk-therapist", "keywords": ["改写故事"]}, {"id": "maybe-pain-into-words", "point": "痛苦必须被言说才能被治愈。把内心的混乱转化为语言的过程本身，就是一种魔法", "explanation": "很多情绪只有在你说出来的时候才会变得真实、可处理。在你心里反复咀嚼，它们只是模糊的、强烈的痛。但当你用语言把它表达出来，它就从抽象变成具体，从无力变成有掌控感。", "example": "一个人被背叛后，可能几个月都沉浸在'我太傻了'的自责中。但在治疗室里，当他说出'我感到被背叛，我愤怒，我伤心'时，这些情绪开始有了边界和形状。他不再被情绪淹没，而是能够和这些情绪共处。", "bookId": "maybe-talk-therapist", "keywords": ["改写故事", "情绪表达"]}, {"id": "maybe-courage-is-vulnerability", "point": "真正的勇气不是无所畏惧，而是在恐惧中仍然选择行动。这需要你接纳自己的脆弱，而不是隐藏它", "explanation": "我们常把勇气理解为强大，但心理学视角的勇气是'敢于脆弱'。敢于说'我害怕'，敢于寻求帮助，敢于承认自己不完美。这种勇气比假装坚强要难一千倍。", "example": "一个男人一直用工作成就来掩盖内心的孤独和恐惧。直到有一天他敢于在治疗师面前哭，敢于说'我很怕一个人'，他才开始真正的改变。那一刻的眼泪，比他所有的成就都更勇敢。", "bookId": "maybe-talk-therapist", "keywords": ["放下抗拒", "自我选择"]}, {"id": "toad-three-ego-states", "point": "你有三个自我状态：儿童状态（情绪化、依赖、寻求关注）、父母状态（批评、控制、照顾）、成人状态（理性、独立、负责）。大多数人的问题是被困在前两个里", "explanation": "当你被指责时陷入'可怜'的儿童状态；当你看到别人的错误时进入'挑剔'的父母状态；只有在成人状态，你才能冷静地思考、做出真正的选择。问题在于，很多人终身被困在某一个状态，无法灵活切换。", "example": "蛤蟆先生陷入抑郁，咨询师问他的问题。他一开始用儿童状态回答：'不是我的错，都怪朋友，我很可怜。'然后他很快又进入父母状态：'我这么努力还被辜负，我太失败了。'咨询才真正开始是当他能从成人状态说：'我需要认识我到底想要什么。'", "bookId": "toad-therapy", "keywords": ["童年影响", "内在觉察"]}, {"id": "toad-childhood-scripts", "point": "你现在的行为模式，绝大多数是你童年学来的。你的父母、你的家庭环境，无意中给你编写了一个'生活脚本'", "explanation": "如果你的父母常常说'你不够好''你一定会失败'，你会内化这个声音。即使成年后没人这么说你，你也会不断自我否定。这不是你的弱点，这是你早期学习的结果。但好消息是：既然是学来的，就可以改写。", "example": "蛤蟆发现自己害怕失败、容易放弃。咨询师引导他回忆童年。他想起，父亲从不表扬他，只批评他的不足。蛤蟆无意中形成了'我不配成功'的信念。直到他意识到这一点，他才能问自己：'这是我真实的想法吗？还是我在重复父亲的声音？'", "bookId": "toad-therapy", "keywords": ["童年影响"]}, {"id": "toad-psychological-games", "point": "你生活中反复发生的冲突模式，其实是一个'心理游戏'。你在无意识中一次次重复相同的受害者剧本", "explanation": "这些游戏看似无意，其实是你为了维持某个身份或避免成长而设置的陷阱。比如'一直被利用'的游戏，或者'一直被否定'的游戏。你抱怨这个游戏，但同时也在维持它，因为至少你知道自己在这个游戏中是谁。", "example": "蛤蟆开始看清自己的游戏：他不断选择不靠谱的朋友，然后愤怒地说'看吧，我又被背叛了'。这让他保持'可怜的受害者'的身份。一旦他看清这个模式，他就有了选择——不再玩这个游戏。", "bookId": "toad-therapy", "keywords": ["重复模式"]}, {"id": "toad-self-punishment", "point": "抑郁往往是一种'自我惩罚'。你在无意识中惩罚自己，因为你内心深处相信自己'不配'幸福", "explanation": "这不是他们能控制的。这是深层的、无意识的自毁行为。只有当他们看清'我在惩罚自己'这个事实，才能开始问：'为什么我要这样对待自己？'", "example": "蛤蟆的抑郁，一开始他归咎于外部——朋友背叛了他。但深入咨询后他发现，真正的原因是他对自己的指责：'我应该更聪明''我应该看出他们不靠谱'。他在因为自己的'失败'而惩罚自己。", "bookId": "toad-therapy", "keywords": ["自卑", "内在对话"]}, {"id": "toad-responsibility-and-choice", "point": "真正的改变开始于：停止怪罪外界，开始为自己的生活负责。这也是真正的自由开始的地方", "explanation": "这是最难的一步，因为这意味着你要放弃'都是别人的错'这个舒服的位置。但同时，这也是最解放的一步。当你承认'我可以选择'，你就真正拥有了力量。", "example": "蛤蟆的转折点是当他说：'我不再是一个被生活欺负的受害者。我是一个可以选择朋友、选择生活方式、选择如何对待自己的人。' 这不是积极心理学的虚假鸡汤，而是一个实实在在的权力转移——从外界回到自己。", "bookId": "toad-therapy", "keywords": ["自我选择"]}, {"id": "inferior-inferiority-universal", "point": "自卑感不是某些人才有的病态，而是人类的普遍状态。从出生的那一刻起，你就处于一个相对弱小的位置", "explanation": "每个人都从自卑感开始——孩子相对于成人是弱小的、无能的。这个基本事实不是缺陷，而是所有成长的起点。阿德勒认为，一个从未经历过自卑感的人反而无法成长。", "example": "一个新生儿完全依赖父母。这不是他的弱点，而是他拼命想要变得有能力的动力。相反，如果一个孩子被过度保护，没有体验过自己的无能，他反而可能无法发展出内驱力。", "bookId": "inferiority-superiority", "keywords": ["自卑", "成长动力"]}, {"id": "inferior-striving-not-dominance", "point": "追求卓越（追求超越）不是追求权力或主宰他人，而是追求自己能力的最大化和个人意义的实现", "explanation": "这是对尼采和弗洛伊德的直接反驳。权力欲望是神经症的表现，而不是健康成长的标志。真正的超越是内向的——你在超越自己的局限，实现自己的潜能。", "example": "一个人可能通过控制和贬低他人来获得权力感，这看起来像'超越'。但阿德勒会说，这其实是对深层自卑感的过度补偿，是一种'优越情结'。真正的超越是：一个曾经害怕公开讲话的人，通过训练变成了一个能够激励他人的演讲者。她没有贬低任何人，但她超越了自己。", "bookId": "inferiority-superiority", "keywords": ["成长动力"]}, {"id": "inferior-lifestyle", "point": "你的'生活风格'（你对待生活的基本方式、你如何解释世界）形成得很早，之后会深刻影响你的所有选择", "explanation": "不同的人面对同样的自卑感，会做出不同的反应。有人会努力克服，有人会放弃，有人会选择控制他人来获得虚假的优越感。这些不同的应对方式，就是不同的'生活风格'。一旦形成，这个风格会自我强化。", "example": "两个被贫困打击的孩子。一个说'我要通过读书改变命运'，形成了追求成就的生活风格。另一个说'反正没希望了'，形成了消极的生活风格。几十年后，他们的人生完全不同，不是因为命运，而是因为早期形成的生活风格。", "bookId": "inferiority-superiority", "keywords": ["身份认同", "童年影响"]}, {"id": "inferior-social-interest", "point": "心理健康的唯一标准是'社会兴趣'——你有多少能力和意愿去贡献于他人和社会。缺乏这个，其他都是病态", "explanation": "一个人可能很成功、很聪明、很有成就，但如果他没有社会兴趣，没有对他人的同情心和贡献意愿，他仍然是病态的。相反，一个平凡的人，如果他能够为他人服务、贡献社会，他就是心理健康的。", "example": "一个百万富翁每天盘算如何更多地赚钱，对他人的疾苦漠不关心。他的自卑感没有转化为社会兴趣，反而变成了贪婪。相反，一个教师月薪微薄，但他用心培育每一个学生，他真正实现了追求卓越，因为他的卓越转化成了对社会的贡献。", "bookId": "inferiority-superiority", "keywords": ["贡献感", "社会兴趣"]}, {"id": "inferior-early-memories", "point": "你对童年的最深刻回忆，往往反映了你当前的生活风格。改变生活风格的第一步，就是理解这些记忆在告诉你什么", "explanation": "一个人记住的不是童年发生过什么，而是什么让他印象深刻。这种选择性记忆，反映了他现在如何看待自己和世界。", "example": "一个人最深刻的童年回忆是'我弄坏了妈妈的花瓶，妈妈很生气'。这个回忆的反复闪现，反映了他现在仍然在内疚、在害怕犯错。他的生活风格就建立在'我必须完美以避免被指责'这个基础上。一旦他理解了这一点，他就可以开始改变。", "bookId": "inferiority-superiority", "keywords": ["身份认同", "童年影响"]}, {"id": "nvc-moralistic-judgments", "point": "我们的沟通充满了'道德判断'——说别人是好还是坏。这是暴力沟通的根源，即使没有一句脏话", "explanation": "当你说'你很自私''你不负责任''你太懒了'，你其实是在进行道德判断。这些评价让对方防守、反驳，甚至反击。沟通变成了战争，因为没人喜欢被评判。", "example": "妻子说'你每天只知道玩手机，你真是个自私鬼'。丈夫立刻防守：'我是在工作！你也天天看电视啊！'原本可能是'我感到被忽视'这个简单的需要，变成了人身攻击的战争。", "bookId": "nonviolent-communication", "keywords": ["沟通技巧"]}, {"id": "nvc-observation", "point": "第一步：观察。用客观、非评判的语言描述事实，不掺杂你的解释和感受", "explanation": "观察是为了让对方听到事实，而不是先入为主地听到指责。这一步很关键，因为大多数人一开口就混合了观察和评判。", "example": "不要说'你不关心我'（评判），要说'这三个月来，我们一起吃饭时你都在看手机'（观察）。这样对方能更清楚地听到你说的是什么，而不是立刻进入防守模式。", "bookId": "nonviolent-communication", "keywords": ["沟通技巧"]}, {"id": "nvc-feelings", "point": "第二步：感受。准确地说出你的真实感受（伤心、失落、愤怒），而不是'我觉得你…'这样的假感受", "explanation": "真实的感受只能关于你自己。'我觉得被背叛'是真感受。'我觉得你很自私'不是感受，是对他人的评价。区分这两者很重要。", "example": "正确的表达是'我感到伤心和失落'。而不是'我觉得你在忽视我'。后者看起来像是感受，其实是对别人行为的解释。", "bookId": "nonviolent-communication", "keywords": ["情绪表达"]}, {"id": "nvc-needs", "point": "第三步：需求。说出你的真实需求——这是重点。每一个愤怒、失落的背后，都隐藏着一个正面的、合理的需求", "explanation": "大多数冲突之所以无法解决，是因为人们只表达了问题，没有说出真实的需求。对方就不知道怎样才能真正满足你。", "example": "你说'我需要陪伴'而不是'你为什么总是忽视我'。当你说出真实需求时，对方更容易理解，也更容易满足。他可能会想'哦，她需要陪伴，我可以做到。'而不是陷入'你凭什么指责我'的防守。", "bookId": "nonviolent-communication", "keywords": ["表达需求"]}, {"id": "nvc-requests", "point": "第四步：请求。提出具体、可执行、正面的请求。不是要求，也不是暗示，是真诚的邀请", "explanation": "请求要足够具体，让对方清楚你想要什么。'希望你更在乎我'太模糊。'周末能否关掉手机，我们一起散步'就很具体。关键是，要给对方说'不'的权力，这样他才能真心说'是'。", "example": "完整的表达应该是：'当你回家后立刻玩手机时（观察），我感到失落（感受），因为我需要陪伴和连接（需求）。你能否在吃饭时放下手机，和我聊天？（请求）' 这个流程清晰、没有评判、给了对方理解和回应的空间。", "bookId": "nonviolent-communication", "keywords": ["沟通技巧"]}, {"id": "nvc-empathetic-listening", "point": "非暴力沟通的另一半是倾听。真正的倾听不是等待你的转身说话，而是完全进入对方的世界，感受他的感受", "explanation": "大多数人听人说话时，其实在想自己要说什么。真正的非暴力沟通需要你放下自己的议程，完全关注对方。这需要练习。", "example": "当对方愤怒地说'你根本不理解我的工作压力'时，你的第一反应可能是辩解。但非暴力沟通的做法是停下来，真诚地问'你现在感到很挫折，是因为你需要被理解，对吗？'这一刻的倾听，往往比任何解释都更治愈。", "bookId": "nonviolent-communication", "keywords": ["共情"]}, {"id": "nvc-self-compassion", "point": "非暴力沟通不仅适用于与他人的交流，也适用于与自己的交流。学会对自己用同样的同情和理解", "explanation": "很多人能对他人有同情，但对自己却很苛刻。这会导致内疚、自责、甚至抑郁。用四步法对自己说话，会改变你对自己的态度。", "example": "你因为犯了一个错误而很自责。如果你对自己用暴力沟通：'我真是个笨蛋，我一直都这么不负责任。'这会让你更糟。如果你用非暴力沟通：'我做错了这件事（观察），我现在感到失望（感受），因为我需要能力和成长（需求）。我想做得更好（请求自己）。'这样你就能从自责转向学习。", "bookId": "nonviolent-communication", "keywords": ["内在对话"]}, {"id": "ah_habit_identity", "point": "不要关注结果目标，而是关注你想成为什么样的人——改变身份才能持久改变行为", "explanation": "比如不是'我要减肥'，而是'我是一个注重健康的人'。每个行动都是在为这个身份投票。当身份认同确立后，坚持习惯就会很自然，因为这不再是'我必须'而是'我就是这样的人'。", "example": "戒烟时不要说'我在戒烟'，而要说'我不吸烟'。前者还在和烟隐性对抗，后者已经改变了自我认知。", "bookId": "atomic_habits", "keywords": ["身份认同", "自我选择"]}, {"id": "ah_system_vs_goal", "point": "系统比目标重要得多——目标只定义了你想要什么，系统才是导致结果的真正过程", "explanation": "大多数人花时间设定目标而不设计系统。设定目标是关于结果，而系统是关于导致这些结果的流程和环境。掌握系统才能持久成功。", "example": "想要成为一个写作者，不要只是'每月写10000字'这个目标，而要设计每天写作的环境、时间、地点。系统会自动导出目标。", "bookId": "atomic_habits", "keywords": ["习惯系统"]}, {"id": "ah_obvious", "point": "环境设计比意志力更关键——改变环境能改变潜意识的选择", "explanation": "人的很多行为都是基于环境暗示的'自动驾驶'。与其依靠意志力抵御诱惑，不如通过改变物理空间来诱导好行为。让好习惯的提示显而易见，让坏习惯的提示隐而不见。", "example": "想喝更多水？把水瓶放在显眼处而不是冷藏柜里。想少看手机？把手机放到另一个房间。医院通过在点餐台附近放瓶装水，显著提升了员工的喝水频率。", "bookId": "atomic_habits", "keywords": ["习惯系统"]}, {"id": "ah_attractive", "point": "把你想养的习惯和你喜欢的事物绑定——能量汇集原理", "explanation": "把枯燥的新习惯和已有的享受活动配对。比如在健身房看喜欢的电视剧，这样大脑会开始关联'健身'和'快乐'。", "example": "不喜欢跑步？在跑步时听最喜欢的播客，把两件事绑定。逐渐'跑步'这个行为本身会变得有吸引力。", "bookId": "atomic_habits", "keywords": ["即时反馈", "习惯系统"]}, {"id": "ah_easy", "point": "两分钟法则——降低起始门槛，使习惯轻而易举就能开启", "explanation": "不是让你只做两分钟就停止，而是用两分钟来打破心理阻力进入'已开启'状态。一旦开启，后面就容易维持。大多数习惯败给拖延，而不是执行。", "example": "想养成阅读习惯？改为'每天读一页'而不是'每天读一章'。想健身？改为'穿上运动服'或'走进健身房'。这些微小行动的心理成本极低。", "bookId": "atomic_habits", "keywords": ["行动力"]}, {"id": "ah_reward", "point": "立即奖励你自己——大脑需要即时反馈来强化行为", "explanation": "人脑对延迟奖励不敏感，但对即时反馈反应敏锐。完成习惯后，立即给自己一个小奖励（不一定是物质的，可以是满足感、打勾、自豪感）。", "example": "健身后立即洗个舒服的澡，跑步后立即坐下来享受咖啡，写了一页书立即打勾标记。这些即时反馈会强化'行为-奖励'的神经回路。", "bookId": "atomic_habits", "keywords": ["即时反馈", "习惯系统"]}, {"id": "ah_compound", "point": "每天进步1%在一年后是37倍，0.1%的衰退也是相反的——时间会放大微小差异", "explanation": "不要期望一下子大改变，而要关注1%的边际改进。改进一点点在当下看不出来，但时间是杠杆。坚持几个月后你就会看到质变。", "example": "健身：每次多加一个5磅的重量。写作：每天多写100字。阅读：每周多读10页。这些看似微不足道的改进，半年后会完全不同。", "bookId": "atomic_habits", "keywords": ["复利效应"]}, {"id": "cog_brain_structure", "point": "大脑分为本能脑、情绪脑、理智脑，成长就是让理智脑驾驭前两者", "explanation": "本能脑和情绪脑掌管天性、目光短浅、急于求成；理智脑掌管智慧但力量较弱。成长的本质是通过意识和训练，让理智脑逐步获得更大的权重。", "example": "吃甜食的冲动来自情绪脑（快乐），长期健康的需求来自理智脑（理性）。成长就是逐步增强理智脑的'话语权'，让你能在关键时刻选择后者。", "bookId": "aware_awakening", "keywords": ["元认知"]}, {"id": "cog_metacognition", "point": "元认知是成长的钥匙——要成为自己思维的舵手，而不是思维的奴隶", "explanation": "大多数人被自动化思维操控，不知道自己在想什么、为什么想。元认知就是对自己思考过程的认知。觉醒就是意识到'我在思考'，从而能调控思维。", "example": "焦虑时，大多数人被焦虑情绪淹没。有元认知的人会观察到'我现在很焦虑'，这种观察本身就打破了焦虑的自动循环，给了你选择的空间。", "bookId": "aware_awakening", "keywords": ["元认知", "内在觉察"]}, {"id": "cog_blur_clarity", "point": "模糊是成长的最大敌人——大部分人的问题不是不努力，而是方向模糊", "explanation": "人在模糊的状态下很难行动，也很容易被各种焦虑淹没。把模糊的目标具体化、把抽象的知识清晰化，就能转化为行动力。", "example": "'我想做好工作'太模糊，导致无法开始。'我这周要完成A项目的第一版本，周五前提交'就清晰了。清晰让行动变得可能。", "bookId": "aware_awakening", "keywords": ["行动力", "目标清晰"]}, {"id": "cog_deliberate_practice", "point": "深度练习需要三个条件：极度专注、在拉伸区、即时反馈——否则就是虚假勤奋", "explanation": "大多数人的学习是低效的。真正的刻意练习要求你在稍微超出舒适区的地方工作，并且立即得到反馈。否则再努力也只是制造'勤奋的假象'。", "example": "学英语：随意听广播不行（没压力），每天限时做真题、对答案、分析错误才行（有压力+反馈）。学编程：刷题不行，必须做真实项目、被代码评审（拉伸区+反馈）。", "bookId": "aware_awakening", "keywords": ["拉伸区"]}, {"id": "cog_output_learning", "point": "输出是最强的学习方式——教别人是验证自己是否真的懂", "explanation": "你以为看懂了，其实只是产生了熟悉感。真正的理解要通过输出验证。写文章、讲解、做项目时的困顿，会暴露出你理解的漏洞。", "example": "读完一本书感觉学到了很多，但写书评时突然发现词不达意、逻辑混乱——这就是真实的学习。输出的过程是补漏的过程。", "bookId": "aware_awakening", "keywords": ["以输出学", "深度学习"]}, {"id": "cog_income_cognition", "point": "收入的天花板就是认知的天花板——想增加收入，必须先升级认知框架", "explanation": "很多人努力工作却收入没有增长，根本原因是认知水平没变。你能看到的赚钱机会、能把握的机遇，都取决于你的认知水平。", "example": "工业时代想靠加班赚钱；信息时代要靠学习和创新赚钱；时间不对的努力再多也没用。提升收入前，要先升级对赚钱本质的理解。", "bookId": "aware_awakening", "keywords": ["元认知"]}, {"id": "pon_mindnottself", "point": "你的思维不是你本身——你可以观察思维，说明你在思维之外", "explanation": "大多数人被脑子里的声音控制，陷入过去的遗憾和未来的焦虑，忽视了真实的当下。但如果你能意识到'我在思考'，说明你比思维更本质。", "example": "焦虑的念头来了，你能观察到这个念头，那么这个能观察的'你'就不是念头本身。这个观察者身份才是真实的。", "bookId": "power_of_now", "keywords": ["元认知", "内在觉察"]}, {"id": "pon_pain_resistance", "point": "痛苦不来自发生的事，而来自你对事的抗拒——接纳当下就能缓解苦难", "explanation": "一个外部事实本身是中立的。但你的抗拒、否定、争执会产生痛苦。当你停止'这不应该发生'这样的思想，就能放下伴随的情绪。", "example": "被堵在路上。抗拒状态：愤怒、抱怨、焦虑（让心理更难受）。接纳状态：承认这是现实，不再内耗（反而可能比快速到达还轻松）。", "bookId": "power_of_now", "keywords": ["放下抗拒", "活在当下"]}, {"id": "pon_now_is_real", "point": "过去已逝，未来未至，生命只真实存在于当下——过去和未来只是思维的产物", "explanation": "你无法改变过去，无法控制未来，能做的只有当下的选择。对过去的遗憾和对未来的焦虑都是当下的思维活动，而你可以选择放下它们。", "example": "现在，你只需要做当下这件事。过去的失败只在脑子里，未来的恐惧也只在脑子里。当你全身心投入此刻，焦虑自动消失。", "bookId": "power_of_now", "keywords": ["放下抗拒", "活在当下"]}, {"id": "pon_presence", "point": "临在（纯粹的当下意识）是通往内在力量和喜悦的入口", "explanation": "当你完全进入当下，没有对过去的评判、没有对未来的恐惧，你就进入了一种深层的宁静和力量。这时你的行动是最有效的。", "example": "做一件事时完全沉浸其中，忘记时间和自我评价，这时工作效率最高、创意最多。这就是临在状态。", "bookId": "power_of_now", "keywords": ["活在当下"]}, {"id": "pon_surrender", "point": "臣服不是消极，而是停止和现实内斗——放下抗拒你才能真正行动", "explanation": "臣服意味着完全接纳此刻的现实，不再争执'这不应该这样'。正是这种放下，反而给了你最清晰的行动力。", "example": "工作失误被批评。抗拒状态：内心反驳、自责、愤怒，很难冷静思考。臣服状态：接纳事实、接纳情绪，反而能更清晰地分析和改进。", "bookId": "power_of_now", "keywords": ["放下抗拒"]}, {"id": "pon_observer", "point": "成为思想的观察者，不加评判地注视它们——这就是从思维中解脱", "explanation": "不是要清空思想，而是改变和思想的关系。当你成为观察者而不是被淹没者，思想对你的控制力就减弱了。", "example": "负面念头来了，不是压制它，而是观察它'我注意到我在想这个'。这个观察本身就打破了思想的自动运行。", "bookId": "power_of_now", "keywords": ["元认知"]}, {"id": "wol_happiness_origin", "point": "幸福主要取决于一个人内在的性质，而非外部条件——这是决定命运的根本因素", "explanation": "决定幸福的三个因素：一个人是什么（天赋、气质、精神能力）、一个人有什么（财富）、一个人在他人眼中是什么（名声）。但最关键的是第一个，占比远超其他两个。", "example": "两个人同样富有，一个快乐一个痛苦，区别在于他们的精神能力和性格。一个人再富有，如果内心空虚，也感受不到幸福。", "bookId": "wisdom_of_life", "keywords": ["内在觉察"]}, {"id": "wol_suffering_foundation", "point": "人生本质在于痛苦和无聊之间摇摆，真正的幸福是稀有的——接受这个才能解脱", "explanation": "不要期待人生总是舒适的。贫穷和疾病带来痛苦，得到又带来无聊。大多数人要么忙于解决问题（痛苦），要么找不到事做（无聊）。", "example": "工作太累是痛苦，失业闲散是无聊。有了钱反而觉得空虚。这不是坏事，这是真相——接受它就不会总是失望。", "bookId": "wisdom_of_life", "keywords": ["放下抗拒"]}, {"id": "wol_own_faults_blind", "point": "我们看不到自己的过错，只看得到别人的——这是人性的盲点", "explanation": "这个观察非常深刻。我们对自己极其宽容，却对他人严苛。了解这一点能帮助你减少不必要的冲突和判断。", "example": "别人不守时你生气，自己迟到就有理由。别人说错话你嘲笑，自己出错就忙着解释。看清这一点能增加对他人的容忍。", "bookId": "wisdom_of_life", "keywords": ["认知偏差", "内在觉察"]}, {"id": "wol_wisdom_through_solitude", "point": "要么庸俗，要么孤独——精神生活越丰富的人，越难找到志同道合者", "explanation": "这是叔本华最著名的论断。如果你想保持精神独立和深度思考，就要接受大多数时候的孤独。不是所有人都能陪你到底。", "example": "你想深度阅读、冥想、思考人生意义，而身边人只想聊八卦和消费。这不是他们不好，而是层级不同。孤独是高度思考的代价。", "bookId": "wisdom_of_life", "keywords": ["孤独", "内在觉察"]}, {"id": "wol_acceptance", "point": "要跟他人相处，就必须接纳每个人固有的个性——既不能改变他，也不能否定他", "explanation": "很多人际冲突来自试图改造他人。叔本华说得透彻：接纳他人的本质，而不是期待他变成你想要的样子。这是成熟的标志。", "example": "你不能改变父母的固执，改变伴侣的习惯，改变同事的缺点。唯一的选择是接纳他们原本的样子，或者离开。", "bookId": "wisdom_of_life", "keywords": ["放下抗拒", "边界感"]}, {"id": "wol_carefulness_generosity", "point": "人生有两条戒律：一要谨慎小心，二要宽宏大度。前者帮你避免伤害，后者帮你避免纷争", "explanation": "谨慎让你看清世界的残酷一面，不被欺骗；宽宏让你不会因小事和人冲突。两者结合才是生存的智慧。", "example": "谨慎：不要轻信、不要做傻事、保护好自己的边界。宽宏：不要计较小事、不要记仇、对他人的缺点多包容。", "bookId": "wisdom_of_life", "keywords": ["心智成熟", "边界感"]}, {"id": "wol_suffering_is_anger", "point": "人的一切痛苦，本质上都是对自己无能的愤怒——接受无能就能接受痛苦", "explanation": "你之所以痛苦，是因为你无法控制现实。一旦接受了自己的有限性和无能，反而能平静对待。", "example": "失败最痛苦的不是失败本身，而是'我怎么这么无能'的自责。如果接受'我就是有局限'，反而能冷静总结经验。", "bookId": "wisdom_of_life", "keywords": ["放下抗拒"]}, {"id": "msm_last_freedom", "point": "人失去了一切，唯一无法失去的是在任何特定境遇中选择态度的自由", "explanation": "这是作者作为纳粹集中营幸存者的亲身发现。在完全被剥夺的极限环境下，他观察到：人能被夺走生命、自由、尊严，但无法被夺走选择态度的权力。", "example": "两个集中营囚徒处境完全相同。一个放弃希望、消极颓废，很快死亡；另一个保持尊严、帮助他人、寻找意义，活了下来。区别只在于态度。", "bookId": "mans_search_meaning", "keywords": ["自我选择", "意义感"]}, {"id": "msm_meaning_as_survival", "point": "有意义的人活得更久——对生命的意义越清晰，越能在苦难中坚持", "explanation": "弗兰克尔观察到，那些失去活着理由的囚徒（觉得活着没意义），身体最先崩溃。而那些对活着有清晰理由的人（完成某个使命、见到某个人），反而活了下来。", "example": "一个囚徒想活着是因为要完成一部文学著作；另一个想见到远方的家人。这些具体的'为什么活着'，让他们在地狱中坚持下去。", "bookId": "mans_search_meaning", "keywords": ["意义感"]}, {"id": "msm_will_to_meaning", "point": "人类最核心的动力不是快乐，也不是权力，而是寻求意义——这是活着的根本驱动力", "explanation": "弗洛伊德说人追求快乐，阿德勒说人追求权力，但弗兰克尔发现真实的人类动机是寻求意义。没有意义，再快乐再有权力都虚空。", "example": "很多成功人士得到了金钱和权力，却陷入空虚和抑郁。因为他们追求的是外物而不是意义。反而一些看起来不成功的人，因为找到了意义，活得充实。", "bookId": "mans_search_meaning", "keywords": ["意义感"]}, {"id": "msm_three_paths_meaning", "point": "人可以通过三条途径发现意义：创造工作、体验爱、面对苦难时的态度", "explanation": "不是所有人都能完成伟大事业。但每个人都能通过工作创造价值，通过爱接纳他人，通过态度赋予苦难意义。这三条路对所有人开放。", "example": "清洁工通过认真工作创造意义，一个被病痛困扰的人通过坚忍的态度创造意义，一个平凡的人通过爱家人创造意义。伟大不是必需的，意义才是。", "bookId": "mans_search_meaning", "keywords": ["意义感", "贡献感"]}, {"id": "msm_responsibility", "point": "不要问'生命的意义是什么'，而要认识到生命在质问你——你有责任回答这个质问", "explanation": "意义不是被赋予的，而是每个人要自己去找、去创造。你面对的每个问题、每个境遇，都是生命在问：'你要怎么做？'你的选择就是答案。", "example": "失业不是坏事本身，是生命在问'你现在要怎么办'。失去亲人不是终点，是生命在问'你要怎么继续活'。每次回答，你就在创造意义。", "bookId": "mans_search_meaning", "keywords": ["意义感", "自我选择"]}, {"id": "msm_suffering_meaning", "point": "痛苦本身不一定有意义，但你面对痛苦的态度可以赋予它意义", "explanation": "不是所有痛苦都有理由或教训。但如果你选择用高尚的态度去承受它，去从中学习，那痛苦就被升华成了意义。", "example": "一个疾病本身没有意义，但如果你因此变得更有同情心、更珍惜生命、更积极帮助他人，那疾病就被你赋予了意义。", "bookId": "mans_search_meaning", "keywords": ["意义感"]}, {"id": "dt_dark_time", "point": "暗时间是指走路、洗澡、等待时的后台思考——善用这些时间才能拉开与他人的认知差距", "explanation": "每个人都有24小时，但聪明人能利用碎片时间进行深度思考、逻辑构建、知识连接。这些不在工作表上的时间，决定了你的认知深度。", "example": "跑步时不是听歌，而是反思这周遇到的问题。洗澡时不是放空，而是理清思路。这些被大多数人浪费掉的时间，是聪明人的思考工厂。", "bookId": "dark_time", "keywords": ["深度学习"]}, {"id": "dt_compound_knowledge", "point": "知识也有复利——通过持续思考和连接，知识会产生倍增效应而不只是堆积", "explanation": "大多数人学习是线性的：读10本书还是10倍的知识量。但如果你通过思考把它们连接起来，会产生指数级的理解深度。", "example": "读很多书但不思考，知识是孤立的；通过暗时间把这些知识连接、对比、整合，就会产生新的见解，这就是复利。", "bookId": "dark_time", "keywords": ["深度学习", "复利效应"]}, {"id": "dt_illusion_of_busyness", "point": "只读书不思考是勤奋的假象——真正的学习发生在你被迫理解的时刻", "explanation": "读完一本书感觉学到了，其实只是产生了熟悉感。真正的学习是通过困难和挑战，被迫去理解和改变思维。", "example": "舒服地读书不等于学到了。被一道题卡住，冥思苦想终于理解，这才是真正的学习。流汗的时刻才是学习发生的时刻。", "bookId": "dark_time", "keywords": ["行动力", "深度学习"]}, {"id": "dt_output_verification", "point": "输出是验证学习的唯一标准——教别人是最好的学习", "explanation": "你以为懂了，但写文章、给别人讲解时会发现：词不达意、逻辑缺陷、理解不足。输出的过程就是补漏的过程。", "example": "学完一个概念，写一篇文章解释它。这个过程会暴露出你理解的所有漏洞。这才是真正的学习发生之处。", "bookId": "dark_time", "keywords": ["以输出学", "深度学习"]}, {"id": "dt_reflection", "point": "反思是提升思维品质的最重要手段——但大多数人从不主动反思", "explanation": "经历不等于成长。反思经历才能提取教训。许多人重复犯同样的错误，就是因为不反思。", "example": "失败后，要问'为什么失败''我学到了什么''下次怎么做不同'。这些问题的回答，才是真正的学习。", "bookId": "dark_time", "keywords": ["元认知"]}, {"id": "dt_task_decomposition", "point": "把大任务分解成极小的里程碑，然后把每个里程碑细化到可直接动手的程度", "explanation": "拖延的根本原因是任务太大太模糊，大脑感到焦虑。一旦分解到'可以在5分钟完成'的程度，心理阻力就会消失。", "example": "'写一部小说'会让你拖延。但'今天写第一章的开头段落'还是太大。分解到'打开电脑，写出故事的前三句话'，你立马能开始。", "bookId": "dark_time", "keywords": ["行动力"]}, {"id": "dt_next_action", "point": "永远清楚'下一步是什么'——模糊的下一步是拖延的温床，清晰的下一步消除心理阻力", "explanation": "人对模糊的任务容易逃避，对清晰的小任务容易上手。每次完成一个小行动，大脑都会获得成就感，自动进入下一个循环。", "example": "'我要健身'太模糊，容易拖延。'今天晚上7点穿上运动装，走到健身房'就清晰了。行动的第一步永远是最难的，清晰化这一步就能突破。", "bookId": "dark_time", "keywords": ["行动力", "目标清晰"]}, {"id": "dt_flow_state", "point": "进入Flow状态（心流）比盲目地长时间工作高效得多——利用心理学让自己进入最优状态", "explanation": "高效不是指时间长，而是指进入深度专注的Flow状态。在这个状态下，时间感消失，工作效率是平时的数倍。", "example": "毫无压力地8小时工作，效率可能不如进入Flow状态的1小时。关键是营造条件让自己进入这种状态：消除干扰、设定时间限制、给任务足够的难度。", "bookId": "dark_time", "keywords": ["心流"]}, {"id": "rlt_life_difficult", "point": "人生充满困难，心智成熟的过程就是直面并解决问题的过程——逃避问题会导致心灵停滞", "explanation": "很多人期待生活变得容易，但派克说得直白：生活本来就困难。那些逃避问题、躲避困难的人，心灵会停留在幼稚阶段。", "example": "遇到困难关系，有人沟通解决，有人躲避冷战。解决的人心灵成长了，躲避的人一次次重复相同的模式。", "bookId": "road_less_traveled", "keywords": ["心智成熟", "自律"]}, {"id": "rlt_discipline_core", "point": "自律不是压抑，而是明智地延迟满足——是克服困难的唯一工具", "explanation": "自律包括四个方面：推迟满足感（为了未来放弃现在的快乐）、承担责任（不推卸不逃避）、忠于事实（诚实对待现实）、保持平衡（不走极端）。", "example": "想要进步就要推迟看手机的快乐、承担练习的辛苦、诚实面对自己的不足。没有自律，一切努力都是幻想。", "bookId": "road_less_traveled", "keywords": ["自律"]}, {"id": "rlt_love_not_feeling", "point": "爱不是一种感觉，而是一种意愿——是为了促进自我和他人心智成熟，而不断拓展自我界限的意愿", "explanation": "大多数人把爱等同于情感或性吸引。但派克定义的爱是一种选择和承诺：即使不开心，仍然选择对方的成长，拓展自己的界限去理解和帮助。", "example": "爱一个人不是'永远开心在一起'，而是'即使有分歧，也愿意为彼此的成长而努力'。这需要承受痛苦、改变自己、不断超越自己。", "bookId": "road_less_traveled", "keywords": ["心智成熟", "亲密关系"]}, {"id": "rlt_love_requires_discipline", "point": "真正的爱需要自律和付出——没有自律的爱是依赖和执着", "explanation": "很多人的爱其实是依赖：'我需要你完成我'。真正的爱是：'即使没有你，我也是完整的，但我愿意为你的成长而改变。'", "example": "依赖型的爱：'你不理我我就很难受'。真正的爱：'我尊重你的独立性，我们各自成长，然后在更高层面相聚。'", "bookId": "road_less_traveled", "keywords": ["亲密关系", "自律"]}, {"id": "rlt_spiritual_growth", "point": "心智成熟是通往灵性的路——需要放下小我，拥抱更大的真实", "explanation": "成熟不只是理性，还包括精神。人需要学会超越自我的欲望，连接到更大的生命意义。这是最后的成长。", "example": "年轻人以自我为中心，成熟的人开始看到自我的局限性。最成熟的人能够看到自己在整个宇宙中的位置，找到精神的寄托。", "bookId": "road_less_traveled", "keywords": ["心智成熟", "成长动力"]}, {"id": "rlt_loneliness_of_growth", "point": "少有人走的路是孤独的——真正的心智成熟意味着要承受大多数人无法理解的孤独", "explanation": "派克最深刻的洞见：成长伴随孤独。你越成长，就越难找到同行者。大多数人不愿付出成长的代价，宁愿选择舒适的幻象。", "example": "你想深度思考、认真对待生活、追求真实，但身边大多数人只想安乐。这不是他们的错，但确实会让你感到孤独。", "bookId": "road_less_traveled", "keywords": ["孤独", "心智成熟"]}, {"id": "rlt_grace", "point": "人生的成长中存在一种超越理性的力量——可能是潜意识、可能是命运、可能是恩典", "explanation": "派克在最后承认：并非所有的成长都能用理性解释。有时一个洞见、一次机遇、一个遇见，会改变人生轨迹。这种超越预期的力量，派克称之为'恩典'。", "example": "你按部就班地成长，但某个时刻突然豁然开朗，明白了生活的真谛。这不只是学习的结果，更是一种被给予的礼物。保持开放和感恩。", "bookId": "road_less_traveled", "keywords": ["心智成熟"]}, {"id": "attached-levine-heller-decoding-attachment-wiring", "point": "我们对亲密的渴望不是弱点，而是人类进化的产物——内置的生存机制，不是心理问题", "explanation": "人类在远古时期依赖群体才能生存。当今的亲密需求直接来自这种演化的依附系统。当伴侣说'我很孤独'，他们不是在撒娇，而是在激活一个深度的神经生物学反应。", "example": "一个过度工作的人（说自己'很独立'）突然失业后会变得异常渴求伴侣的陪伴——这不是性格改变，而是依附系统的激活。当基础的生存焦虑出现时，需要亲密感就会凸显。", "keywords": ["心智成熟", "亲密关系"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-attachment-styles-three-types", "point": "你的爱人方式由三个标准模板组成，而不是无限变化——知道你的类型就能预测你的痛点", "explanation": "安全型、焦虑型、回避型这三种附着风格各有其神经路径。焦虑型对拒绝的敏感度极高，会反复测试伴侣；回避型把靠近视为威胁，习惯逃离；安全型则既能接纳亲密也能享受独立。", "example": "一对情侣吵架：焦虑型伴侣说'你根本不爱我'，回避型回应'我需要空间'。双方都觉得被伤害，其实是两个不同系统的冲突——不是恶意，是程序差异。", "keywords": ["沟通技巧", "表达需求"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-dependency-paradox", "point": "你越能信任伴侣，就越能做自己——真正的独立来自安全的依赖，而不是孤独", "explanation": "心理学上的'依赖悖论'说明：当一个人知道伴侣会在需要时出现，反而会放下对关系的焦虑，把能量投入工作、兴趣和成长。相反，那些声称'不需要任何人'的人往往在深层被焦虑驱动。", "example": "一个在安全关系中的人可能比单身时更投入创业，因为他/她不需要为感情安全感耗尽精力。而一个在焦虑型关系中的人则会频繁检查手机、猜测伴侣想法，无法专注工作。", "keywords": ["放下抗拒", "自我选择"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-self-assessment-secure", "point": "安全型的人早就找到答案了，问题出在你对自己的了解不清——越早诊断，越早止损", "explanation": "焦虑型在测试伴侣；回避型在逃离；安全型在解决问题。这三种人在同一场冲突中表现完全不同。焦虑型会重复询问'你爱我吗'，而安全型会说'我们怎样解决这个问题'。", "example": "伴侣迟到一小时。焦虑型开始编故事（'他是不是出轨了'），回避型关闭手机（'我不想听解释'），安全型问'发生了什么'。", "keywords": ["内在对话", "元认知"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-anxious-radar", "point": "焦虑型对伴侣的冷淡反应能形成毫秒级的感知——你的雷达太灵敏，但判断系统有偏差", "explanation": "焦虑型人格具有超强的情感敏感度。他们能感知到伴侣语气的微妙变化，但会错误解读为拒绝。这种'微观感知'是神经生物学特征，源于幼年的不一致关照。", "example": "伴侣说'我今天很累'，焦虑型听到的是'我不想和你在一起'。然后开始了查证循环：反复追问、寻求保证、甚至主动激怒对方来'确认'他们还在乎。", "keywords": ["认知偏差", "情绪表达"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-anxious-seeking-reassurance", "point": "对保证的渴望本身就是问题——你越求证'你爱我吗'，伴侣越会疲惫和逃离", "explanation": "焦虑型的反复确认是在尝试调节自己的神经系统。但这种策略会激怒回避型伴侣，导致对方更加退缩，进而证实了焦虑型的恐惧——形成恶性循环。", "example": "焦虑型需要每天听100次'我爱你'才能感到安全，但这样做只会让伴侣感到窒息。两人都没有错，只是节奏不匹配——就像一个人需要多次触摸才能感到温暖，而另一个人被频繁触摸激怒了。", "keywords": ["沟通技巧", "表达需求"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-avoidant-independence-myth", "point": "回避型把接纳伴侣等同于丧失自我——这是对'独立'最深的误解，也是最高的防御代价", "explanation": "回避型在幼年学会了：靠近=危险。所以他们发展出'去激活策略'来保持距离：专注伴侣的缺点、避免性亲密、总想起前任。表面上很独立，实际上是被恐惧驱动的逃避。", "example": "一个回避型的人在最该陪伴伴侣的时刻（失业、生病、丧亲）反而工作更忙。不是他不爱，而是靠近脆弱的伴侣会激发他内心的焦虑。他通过逃离来'保护'自己。", "keywords": ["放下抗拒", "边界感"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-avoidant-deactivating-strategies", "point": "回避型的'去激活策略'是精妙的自欺——专注伴侣缺点、性冷淡、念旧，都是在给自己退出的理由", "explanation": "当伴侣表达需要靠近时，回避型会无意识地采用几种策略：(1)批评伴侣（'你太敏感了'）(2)避免性亲密（'我累了'）(3)怀念前任（潜台词：你不够好）。这些都是神经自我保护机制。", "example": "一个回避型男性，伴侣提出要更多陪伴时，他开始不断指出她的缺点：'你太依赖'、'你的工作不稳定'。这不是真实评价，而是在制造逃脱的借口——'看，她根本不够好，我没有理由留下'。", "keywords": ["沟通技巧", "内在对话"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-anxious-avoidant-fatal-dance", "point": "焦虑型和回避型总是互相吸引，因为他们互相验证了彼此最深的恐惧——这是爱情中最具破坏性的舞蹈", "explanation": "焦虑型需要靠近来获得安全感，回避型需要距离来获得安全感。焦虑型靠近→回避型逃离→焦虑型更紧张→回避型更想逃。两人都在尽力求生存，但用的方法互相摧毁。", "example": "一段典型的焦虑-回避关系：她每晚等他回家，发消息无回应就开始想象最坏的情况。他下班回家看到她的焦虑就感到窒息，需要独处。她把他的独处理解为拒绝，更紧张。他因为被监控感到被侵犯，更逃离。三年后分手，双方都觉得'对方根本不爱我'。", "keywords": ["沟通技巧", "亲密关系"], "bookId": "attached-levine-heller"}, {"id": "attached-levine-heller-secure-communication", "point": "安全型沟通的核心就一个：不带情绪指控地表达需求，同时对伴侣的回应持开放态度", "explanation": "安全型说'我今天感到很孤独'，而不是'你总是忽视我'。他们能接纳伴侣的解释而不是坚持自己的指控。这种沟通模式能自然地化解冲突，而不是激化。", "example": "焦虑型：'你为什么每次都这样对我？你肯定不爱我。'安全型：'我注意到最近我们的时间少了，我想和你谈谈这个。'后者打开了对话，前者关闭了。", "keywords": ["沟通技巧", "表达需求"], "bookId": "attached-levine-heller"}, {"id": "neurotic-personality-horney-neurosis-not-pathology", "point": "神经症不是病，而是对充满威胁的世界的一种精妙的生存策略——当策略本身变成了枷锁时，你才开始受苦", "explanation": "霍妮认为神经症是在具体的文化和家庭环境中发展出来的。现代社会强调竞争、个人成就、自我依赖，这种环境会自然地激发焦虑。神经症是对这种焦虑的合理回应，只是后来固化了。", "example": "一个从小被父母忽视的孩子发展出强烈的'表现欲需求'——通过卓越来获得关注。这在童年是聪慧的生存策略，但到了成人社会，它变成了无法停止的追求，导致抑郁症。", "keywords": ["自卑", "童年影响"], "bookId": "neurotic-personality-horney"}, {"id": "neurotic-personality-horney-basic-anxiety", "point": "所有神经症的根源是一种无所不在的'基础焦虑'——这种焦虑来自早年被看作物品而非人的体验", "explanation": "当一个婴儿哭泣时，如果没有被及时回应，他/她会形成一种深层的无助感。这不只是一次失望，而是对世界不安全的系统性学习。成人后，这种焦虑会以各种方式显现：过度工作、过度依赖、过度攻击等。", "example": "一个被严厉或冷漠父母养大的孩子，无论后来多成功，都会有一种挥之不去的'不够好'的感觉。他可能会变成工作狂或完美主义者，试图通过表现来'修复'那个被忽视的孩子。", "keywords": ["放下抗拒", "自卑"], "bookId": "neurotic-personality-horney"}, {"id": "neurotic-personality-horney-three-coping-orientations", "point": "面对基础焦虑，我们会不知不觉选择三种武器之一：贬低自己、贬低他人，或逃离所有人——而大多数人一辈子只用其中一种", "explanation": "霍妮定义了三种神经症的应对方式：(1)向人靠近型——通过讨好他人来获得安全；(2)对抗型——通过控制和赢来获得安全；(3)远离型——通过独立和隔离来获得安全。每种方式都有内在逻辑，但每种都会走向极端。", "example": "(1)向人靠近型的人可能变成人缘好的烈士，从不表达自己真实需求；(2)对抗型变成工作中的独裁者，家里的独裁者；(3)远离型变成冰冷的完美主义者，看起来很强大但完全孤立。", "keywords": ["沟通技巧", "边界感"], "bookId": "neurotic-personality-horney"}, {"id": "neurotic-personality-horney-pathological-need-for-love", "point": "当需要爱变得无差别、强迫性、永不满足时，它就从自然需求变成了精神吸毒", "explanation": "神经症患者对爱的需求不是为了关系，而是为了平息焦虑。他们会向任何人要爱，对象不重要，'爱'本身才是目标。这导致他们频繁陷入不健康的关系，并在关系中越来越焦虑。", "example": "一个女人，无论和谁在一起都会很快做出巨大的妥协——改变外表、放弃朋友、否定自己的想法。她不是爱上那个人，而是爱上'被爱'这个状态。当伴侣要求空间或表示异议，她会陷入深度恐慌。", "keywords": ["重复模式", "亲密关系"], "bookId": "neurotic-personality-horney"}, {"id": "neurotic-personality-horney-neurotic-ambition", "point": "神经症患者对成功的渴望不是为了成就本身，而是为了平息内心的自卑——永远不会被'够多'满足", "explanation": "对抗型神经症患者会痴迷于权力、财富、名声。但有趣的是，他们获得这些后并不会感到快乐，因为真正的饥饿不是对外部的，而是对内部的自我认可。他们用不停的获胜来压制内在的'我不够好'。", "example": "一个CEO，赚到足以舒适生活的钱后，仍然被驱使工作到午夜。他不是在为家人或梦想工作，而是在用成功来'证明'自己的价值。如果他停下来，他会感到可怕的虚无和自怀。", "keywords": ["行动力", "自我选择"], "bookId": "neurotic-personality-horney"}, {"id": "neurotic-personality-horney-neurotic-guilt", "point": "神经症患者的内疚不是因为做错了什么，而是因为他们对'应该'的标准无法人性地满足", "explanation": "霍妮观察到一个模式：有些人因为所有事情都感到内疚。他们没有违反道德，但内疚感是持久的背景噪音。根源是他们对'理想自我'的非现实期待——他们应该总是有耐心、总是对、总是无私。真实自我无法达到这个标准，所以内疚是恒定的。", "example": "一个母亲对自己发脾气感到永久性内疚——尽管她99%的时间都很有耐心。每一次的'失败'都会激发深层的自责。这不是道德良知，而是对完美的不可能追求。", "keywords": ["自卑", "内在对话"], "bookId": "neurotic-personality-horney"}, {"id": "neurotic-personality-horney-neurotic-suffering", "point": "神经症患者对自己的痛苦有着诡异的执着——因为受苦证明了他们的价值和特殊性", "explanation": "霍妮发现一个悖论：一些神经症患者会不自觉地维持他们的痛苦。因为如果他们不再痛苦、不再特殊、不再在与自己的斗争中牺牲，他们就会面对一个无助的问题：'我究竟是谁？'受苦反而给了他们身份。", "example": "一个人在心理治疗中取得巨大进展，症状缓解了。但随后他/她会找到新的理由重新陷入焦虑——因为'健康'的自己没有那个'痛苦而深刻'的自己吸引人。", "keywords": ["身份认同"], "bookId": "neurotic-personality-horney"}, {"id": "love-at-goon-park-blum-why-harlow", "point": "哈洛是一个诗人和梦想家被困在科学家的身体里——他用冷酷的实验来证明最温暖的东西", "explanation": "哈洛在1950年代崛起时，美国心理学被行为主义控制。这个学派认为爱是幻觉，母爱只是条件反射（喂食=爱）。医生甚至建议父母不要拥抱孩子以免'宠坏'他们。哈洛用猴子实验推翻了这个冰冷的学说。", "example": "一个被建议'不要太经常抱孩子'的母亲，在读到哈洛的研究后，意识到她一直被错误的科学支配。她开始更自由地给孩子拥抱，而不觉得是在'娇惯'。", "keywords": ["共情", "童年影响"], "bookId": "love-at-goon-park-blum"}, {"id": "love-at-goon-park-blum-contact-comfort", "point": "婴儿会为了舒适而抗拒食物——接触的需求比生存本身更基础", "explanation": "哈洛的标志性实验：婴儿猴子被分别放在两个'母亲'面前——一个铁网母亲提供奶瓶，一个布料母亲什么都不提供。婴儿猴子压倒性地选择布料母亲，只在饥饿时短暂去铁网母亲那里进食，然后立刻回到布料母亲怀里。", "example": "一个饥饿的婴儿会在抱起他的瞬间停止哭泣——不仅仅是因为将要被喂食，还因为肌肤接触本身就是一种生理的镇定。这解释了为什么被喂食但被忽视的孩子会有终身的心理问题。", "keywords": ["亲密关系", "内在觉察"], "bookId": "love-at-goon-park-blum"}, {"id": "love-at-goon-park-blum-secure-base", "point": "有了安全的拥抱，婴儿会更勇敢地探索世界——爱不是锁链，而是出发点", "explanation": "哈洛观察到：当婴儿猴子从布料母亲的怀抱出发时，它们会更主动地探索新的环境。相比之下，那些缺乏接触安慰的婴儿猴子会蜷缩在角落里，无法探索。这个'安全基地'理论后来被约翰·鲍尔比（依恋理论之父）发展成完整理论。", "example": "一个孩子在陌生的环境里看起来害怕。但如果妈妈的手在身边，他会逐渐变得勇敢和好奇。当妈妈离开时，他又缩回到焦虑。这不是胆小，而是对安全基地的正常需求。", "keywords": ["放下抗拒", "行动力"], "bookId": "love-at-goon-park-blum"}, {"id": "love-at-goon-park-blum-isolation-devastation", "point": "哈洛最黑暗的发现：完全隔离会导致心理的彻底瓦解——这不是悲伤，而是存在性的死亡", "explanation": "哈洛的隔离实验是他最具争议的工作。他将年幼的猴子放在完全隔离的室内数月或数年，结果是灾难性的：猴子出现自伤、自闭、呆滞。长期隔离的猴子即使后来被释放也无法恢复社交能力，无法建立正常的亲子关系，有些还会伤害自己的后代。", "example": "一个被虐待或被长期隔离的儿童可能在成年后显示出类似的行为：社交恐惧、自伤倾向、无法形成亲密关系。这不是他们的性格缺陷，而是早期隔离的神经烙印。", "keywords": ["孤独", "心智成熟"], "bookId": "love-at-goon-park-blum"}, {"id": "love-at-goon-park-blum-love-makes-smarter", "point": "获得母爱的猴子表现出更高的智力、更强的解决问题能力和更大的好奇心——爱和智能不是两个系统，而是一个", "explanation": "哈洛发现一个意外结果：那些被精心抚养的猴子不仅心理更健康，解决智力谜题的能力也更强。他们更有好奇心，更愿意冒险探索。相比之下，被隔离的猴子即使被解救，智力发展也明显滞后。", "example": "现代神经影像学证实了这一点：被温暖拥抱的婴儿的大脑右上颞沟（与同理心相关）的激活更高。温暖的早期关系直接促进了社会认知大脑的发育。", "keywords": ["成长动力", "深度学习"], "bookId": "love-at-goon-park-blum"}, {"id": "love-at-goon-park-blum-harlow-paradox", "point": "哈洛用毕生研究证明爱有多重要，却无法在自己的生活中做到——这个故事本身就说明了问题", "explanation": "布卢姆详细描绘了哈洛的个人生活：一个'聪慧、无畏、酗酒的心理学家'，在感情生活中一团糟。他的第二段婚姻充满了冷漠和距离。许多同事和学生说，哈洛作为一个人比他作为一个科学家更孤独。这个讽刺揭示了一个真相：理解爱和能够去爱是两回事。", "example": "许多研究心理创伤的心理学家本身就有创伤，许多研究孤独的科学家本身就很孤独。知识可以创造距离，但也可能是在逃避。", "keywords": ["身份认同", "意义感"], "bookId": "love-at-goon-park-blum"}, {"id": "do-i-need-therapy-bottomley-fear-of-therapy", "point": "大多数人害怕的不是治疗，而是治疗会迫使他们感受那些一直在压抑的东西", "explanation": "波特利分析了为什么人们会拖延寻求帮助：不仅仅是社会污名，还有一种深层的恐惧——害怕如果开始谈论痛苦，可能会被淹没。害怕'打开潘多拉魔盒'。害怕面对'也许问题就在我身上'的真实。", "example": "一个人说'我不需要治疗，我没那么糟'。但其实他的意思是'如果我承认我需要帮助，我就得承认我一直在逃避什么，而我不确定我能处理那个真实'。", "keywords": ["放下抗拒", "内在觉察"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "do-i-need-therapy-bottomley-what-are-emotions", "point": "情绪不是你可以'控制'的东西——它们是神经系统的直接反应。压抑它们就像按住吸盘球一样，会付出身心健康的代价", "explanation": "波特利用神经科学解释情绪如何运作。当我们经历威胁时，杏仁核会在前额皮质有机会反应之前就启动。这意味着我们的第一反应总是原始的和防御性的。尝试'理性地'压制情绪就是在与生物学对抗。", "example": "一个人在工作中被批评后感到羞耻。他试图'保持理性'和'不在意'。但那种羞耻并没有消失，而是转移成了对老板的恨意、对自己的自怀、睡眠问题或身心症状。", "keywords": ["元认知", "情绪表达"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "do-i-need-therapy-bottomley-anxiety-cycle", "point": "焦虑往往来自对焦虑的焦虑——当你开始害怕自己的恐惧时，就进入了一个自我放大的循环", "explanation": "波特利描述了焦虑的自我维持机制。一个轻微的焦虑信号出现。我们注意到它，开始害怕它意味着什么。这个恐惧本身又产生了新的焦虑信号。现在我们在害怕害怕。这形成了一个指数级增长的螺旋。她称之为'讽刺过程理论'——尝试不去想一个粉红大象会让你更想到粉红大象。", "example": "一个人开始心悸。他立刻想到'我要心脏病发作了'。这个想法本身就引发了更多的心悸。现在他在害怕心悸，而心悸又被这个恐惧强化了。他陷入了自己创造的恐怖。", "keywords": ["内在对话", "认知偏差"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "do-i-need-therapy-bottomley-attention-patterns", "point": "焦虑者的注意力像一个偏斜的雷达，总是在扫描威胁而忽视安全信号", "explanation": "波特利描述了焦虑障碍中的注意力偏向。焦虑的大脑会自动关注威胁线索，而忽视安全线索。在一个有100个安全事物和1个威胁的环境中，焦虑者会固定在那1个上。这不是他们的选择，而是神经生物学的固定模式。", "example": "一个社交焦虑患者在派对上会完全关注那唯一一个看起来没有笑的人，而完全看不到其他20个热情的朋友。", "keywords": ["认知偏差", "元认知"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "do-i-need-therapy-bottomley-interoceptive-awareness", "point": "解决方案不在于'发泄'或'忍住'，而在于内感受觉察——感知你身体的信号而不评判它", "explanation": "波特利引入了'内感受觉察'的概念：能够感知和描述你身体内部的感受（心跳、肌肉紧张、消化感觉等）。这种觉察允许你与情绪共存，而不是被淹没或被冻结。这是一种第三条路：既不是压抑，也不是爆发。", "example": "一个女人感到焦虑。以前她会压抑它或者在伴侣面前爆发。现在她学会了停下来，注意到'我的胸部有紧张感，我的呼吸变浅了，我的手在出汗'。仅仅通过命名和观察这些感受，而不判断它们，焦虑本身就开始缓解了。", "keywords": ["情绪表达", "内在觉察"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "do-i-need-therapy-bottomley-five-strategies", "point": "波特利提供了五个释放和处理情绪的具体策略，都基于身体和觉察而不仅仅是思维", "explanation": "这五个策略包括：(1)呼吸重新设定；(2)运动和摇晃（让被冻结的神经系统重新流动）；(3)声音释放（喊出来、唱歌）；(4)创意表达（画画、写作）；(5)连接（与他人分享）。这些不是'正面思维'技巧，而是让被困在身体中的情绪流动。", "example": "一个人多年的抑郁症通过'表述圆圈'——用不同的视角重新说出同一个故事——开始缓解。这不是因为故事改变了，而是因为故事终于从被冻结的、自动化的叙述变成了活的、可调整的东西。", "keywords": ["行动力", "情绪表达"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "do-i-need-therapy-bottomley-when-to-seek-help", "point": "如果一个情绪症状正在干扰你的生活功能，那就是寻求帮助的时候——不需要等到'足够糟糕'", "explanation": "波特利清晰地列出了求助的指标：(1)持久的情绪症状（超过两周）；(2)症状开始影响工作、关系或日常功能；(3)有自伤或自杀的想法；(4)症状在恶化而不是改善。关键是：你不需要'足够病'才值得被帮助。轻度的焦虑和抑郁也是有效的求助理由。", "example": "一个人因为社交焦虑而开始拒绝邀请，这已经是干扰生活的时候。不需要等到他完全不能离家。", "keywords": ["放下抗拒", "自我选择"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "do-i-need-therapy-bottomley-finding-right-fit", "point": "寻找治疗师就像寻找朋友一样——资格证很重要，但真正重要的是你们能否建立连接", "explanation": "波特利强调治疗关系本身就是治疗的一大部分。一个技能高超但冷漠的治疗师可能不如一个技能中等但真正在听你的治疗师有效。她还解释了不同治疗模式的优缺点（认知行为治疗、心理动力治疗、人本主义等），并给出了如何根据自己的需求选择。", "example": "一个人在第一个治疗师那里没有进展。她之前觉得'治疗就是不适合我'。但换了一个治疗师后立刻有了突破。问题不是治疗，而是匹配。", "keywords": ["共情", "自我选择"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "do-i-need-therapy-bottomley-realistic-expectations", "point": "心理治疗不会让你的问题消失，但会改变你与问题的关系——从'我被卡住了'变成'我在处理这个'", "explanation": "波特利老实地说明了治疗的局限和现实。治疗不会快速'修复'你。有时候会变得更糟，因为你开始感受之前被压抑的东西。但长期来看，治疗让你从被症状驱动变成症状的主人。", "example": "一个人在治疗中期感到'我变得更抑郁了'。这不是治疗失败，而是压抑的情绪被激活并被处理。这是必要的阵痛。", "keywords": ["放下抗拒", "意义感"], "bookId": "do-i-need-therapy-bottomley"}, {"id": "from-friction-to-flow-internal-friction-essence", "point": "内耗是一种精神自我消耗，而非简单的身体疲惫。", "explanation": "内耗根源在于完美主义、过度反思与对不确定性的恐惧。人们陷入念头打架的混乱状态，大量精力耗散在自我评判与焦虑中，导致行动能力下降。", "example": "工作中明知方案80分就足够，却反复修改到120分，白白消耗精力；决策前纠结半天，最后随意选择。", "keywords": ["放下抗拒", "内在觉察"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-entropy-increase", "point": "熵增是人生的默认状态，需要主动输入能量对抗它。", "explanation": "熵增象征无序、混乱、损耗。人需要像电热毯引入电能一样，主动打破心理的封闭系统，引入外部能量（知识、运动、人际互动）来实现负熵。", "example": "不学习的人知识结构越来越陈旧无用；不运动的人身体状态持续恶化；封闭不交流的人关系越来越冷漠。", "keywords": ["心流", "自我选择"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-perfectionism-cost", "point": "完美主义是高成本的幻想，接纳有限性才能获得自由。", "explanation": "追求完美本质是对未来的贪心，却付出了当下生活的代价。接纳自己与世界的有限性，反而能解放精力，用于真正重要的事。", "example": "学生在作业上完美主义，3小时做出一份80分的卷子，而务实的同学1小时完成然后用时间学其他科目。", "keywords": ["放下抗拒", "自我选择"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-flow-definition", "point": "心流 = 清晰目标 + 即时反馈 + 技能与挑战平衡 + 掌控感", "explanation": "心流是一种沉浸状态，四个要素缺一不可。清晰目标让行动有方向；即时反馈（比分、点赞、完成度）给予正向激励；挑战度适中（不太难也不太简单）让人全力投入；掌控感避免被动感。", "example": "玩游戏时设定过关目标（清晰），实时看血条变化（反馈），关卡难度递进（平衡），玩家控制操作（掌控）——所以人们能在游戏中专注8小时。", "keywords": ["行动力", "即时反馈", "心流"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-daily-micro-flow", "point": "心流不需要宏大场景，从日常琐事开始训练。", "explanation": "认真吃饭、专心走路、深度阅读——这些看似平凡的活动都可以设置目标和反馈，逐步训练大脑进入专注状态的能力。微观心流积累成习惯，最终能在重要工作中快速进入深度专注。", "example": "每天吃饭时关掉手机、咀嚼20下，品尝食物味道——这是一个10分钟的心流训练，比冥想更容易执行。", "keywords": ["心流", "习惯系统"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-action-framework", "point": "从内耗到心流需经过四步行动：接纳→筛选→目标→反馈。", "explanation": "第一步停止自我攻击，接纳自身有限性和不完美；第二步减少信息过载，断舍离不必要的输入；第三步设置明确小目标，将焦虑转化为具体行动；第四步建立即时反馈机制获得正向激励。", "example": "一个内耗的人：承认自己做不了十件事（接纳），删除5个app和3个微信群（筛选），明确今天只完成报告初稿（小目标），完成后看到进度条变满（反馈）。", "keywords": ["放下抗拒", "内在觉察", "行动力"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-info-overload", "point": "信息过载是现代人最大的熵增源，需主动做减法。", "explanation": "多数人不是信息不足，而是溺水在信息中。每条未读信息都是一个心理占用，造成持续的焦虑感。主动筛选、定时查看、无情屏蔽是必要的生存策略。", "example": "关掉所有通知，只在固定时间（早中晚各一次）查看信息；订阅100个公众号不如精读5个；知道有100万条热点新闻但选择只看当天3条最重要的。", "keywords": ["元认知", "内在觉察"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-negative-entropy", "point": "负熵体验包括个人、情绪、财富、身体和沟通五个维度。", "explanation": "不只是心理层面的整理，还需从生活的多个维度系统性地对抗熵增：认知的有序、情绪的平稳、经济的增长、身体的健康、人际的顺畅。五个维度互相支撑。", "example": "只有心理建设没有运动锻炼，身体熵增会反过来拖累心理；只有收入增长没有情感联结，财富熵减无法带来真实幸福。", "keywords": ["心流", "心智成熟"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-habit-compound", "point": "心流由碎片习惯积累而成，复利效应在专注力上最明显。", "explanation": "每天15分钟的深度工作坚持一个月，能量和效率提升10%；坚持一年，效率可能翻倍。小习惯的复合增长最终造就大差异。", "example": "每天坚持一个番茄钟（25分钟无干扰工作）看似微小，但一年就是250小时的高效产出，足以改变职业轨迹。", "keywords": ["习惯系统", "复利效应"], "bookId": "from-friction-to-flow"}, {"id": "from-friction-to-flow-meaning-creation", "point": "幸福的支点不在外部环境，而在于赋予行动意义。", "explanation": "相同的工作，一个人觉得是苦力活，另一个人看到自己对他人的贡献。意义感不是发现的，是建构的——通过连接行动与更大价值体系。", "example": "清洁工人只是扫地 vs. 清洁工人在维护每个人的健康环境——同样的行动，后者获得意义感从而获得幸福。", "keywords": ["意义感", "贡献感"], "bookId": "from-friction-to-flow"}, {"id": "courage-to-be-yourself-effort-paradox", "point": "越努力越焦虑源于在错误的方向上奔跑。", "explanation": "人们常把时间精力投入在满足他人期待、追求社会定义的成功上，而非追求内心真实的渴望。这种错位导致再多的成就也填不满内心的空虚。", "example": "学医满足父母期待，每年排名前3却天天焦虑抑郁；转向真正喜欢的创意工作，薪水降低但获得了生活的意义和平静。", "keywords": ["自我选择", "意义感"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-should-vs-want", "point": "\"应该\"是生活中最隐形的绳索，绑架了一代人的幸福。", "explanation": "社会、家庭、朋友用\"应该\"定义了我们的人生轨道：应该结婚、应该升职、应该稳定。这些应该不是来自内心呼召，而是来自外部压力，执行它们是低效的内耗。", "example": "30岁未婚女性不是因为真的想单身快乐，而是受不了\"应该结婚\"的焦虑。最终要么被迫结婚反悔，要么持续自我否定。", "keywords": ["内在对话", "自我选择"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-anxiety-root", "point": "焦虑的根本不是工作多，而是内心没有清晰的自我坐标。", "explanation": "当人不知道自己真正想要什么时，任何反馈都会产生焦虑——成功了会问\"这就是我要的吗\"，失败了更是打击。唯有建立明确的自我认知和价值体系，才能从容应对外部评价。", "example": "明确自己的三大价值观后再做决策，即使失败也不焦虑，因为知道这是朝向真实自我的尝试。", "keywords": ["元认知", "内在觉察"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-emotion-integration", "point": "心智成熟不是克服负面情绪，而是完整地接纳它们。", "explanation": "不是压抑愤怒、否定恐惧、隐瞒悲伤，而是允许它们存在，理解它们的信号。成熟的人会说\"我很害怕，而我还是去做\"，而不是\"我不能害怕\"。", "example": "准备大会演讲前紧张是正常的，成熟的做法是承认紧张（这说明我在乎），而不是强行压抑导致表现生硬。", "keywords": ["心智成熟", "情绪表达"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-self-boundary", "point": "建立完整的自我边界是独立和自由的前提。", "explanation": "边界不是冷漠，而是清晰地区分\"我的\"与\"别人的\"——我的感受、决定、责任。没有边界的人容易被他人的情绪绑架，沦为情绪垃圾桶。", "example": "母亲焦虑就感染全家 vs. 母亲焦虑但我知道那是她的情绪我可以保持冷静——后者是有边界的人的做法。", "keywords": ["边界感", "自我选择"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-inner-dialogue", "point": "内在对话决定了你对自己的评价和行动选择。", "explanation": "每个人内心都有个\"评判者\"，常常很苛刻。改变内在对话（从\"我真垃圾\"到\"这次没做好，下次改进\"）直接影响自信、行动力和幸福感。", "example": "犯错后的内在对话：自我贬低者会陷入自责循环无法行动；成长型对话的人会立刻分析改进方案。", "keywords": ["内在对话", "自我选择"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-childhood-imprint", "point": "童年经历刻在潜意识里，无声地操纵我们的选择和关系模式。", "explanation": "被父母忽视的人长大后容易过度努力争取认可；被控制的人容易陷入两个极端（过度服从或过度反叛）。看见这些模式是改变的第一步。", "example": "从小被说\"没出息\"的人，长大后即使年入百万仍觉得自己失败——这是潜意识的限制信念在作祟。", "keywords": ["重复模式", "童年影响"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-belief-system", "point": "改写故事不是逃避过去，而是重新诠释它的意义。", "explanation": "同样的经历，可以被诠释为\"我很不幸\"也可以是\"这让我学会了坚强\"。不改变事实，但改变它对当下和未来的影响力。", "example": "从贫困家庭出身：受害者视角\"我被命运不公对待\"vs. 成长视角\"匮乏教会了我珍惜和独立\"——同一事实，完全不同的人生轨迹。", "keywords": ["改写故事", "身份认同"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-let-go-grip", "point": "放弃对过去的执念，是获得自由最直接的路。", "explanation": "许多人用一生的能量去\"纠正\"童年的遗憾，却忽视了这本身就是又一种被童年控制。真正的自由来自放手——承认过去已经发生，选择从现在开始写新的故事。", "example": "因为父亲缺席而过度控制孩子 vs. 因为父亲缺席而有意识地给予陪伴——前者还在被童年操纵，后者才是真正的解脱。", "keywords": ["放下抗拒", "自我选择"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-authentic-self", "point": "真实的自己不需要打造人设，只需要有勇气去展现。", "explanation": "成为真实的自己是一个过程，需要不断地在社交中冒险：说出真实想法、承认不知道、展现脆弱。这些都需要勇气。", "example": "在职场上坚持说\"我不同意\"比点头附和需要更多勇气；但长期来看，真实的声音能建立真实的关系和信任。", "keywords": ["身份认同", "自我选择"], "bookId": "courage-to-be-yourself"}, {"id": "courage-to-be-yourself-courage-building", "point": "勇气不是与生俱来的性格特质，而是在失败中积累的能力。", "explanation": "每一次做了害怕的事并活下来，勇气就增长一点。勇气来自尝试，而不是来自完美的自信。", "example": "第一次公开发言手抖腿软，但说完了活着回来；第五次就有点放松；第十次就真的能享受这个过程。", "keywords": ["行动力", "心智成熟"], "bookId": "courage-to-be-yourself"}, {"id": "talk-show-manual-creativity-is-labor", "point": "创意看似是智力活儿，其实是体力活儿，归根结底是苦力活儿。", "explanation": "天天吐槽、不断观察、反复输出——这些都需要大量的重复劳动。灵感只占创意的5%，95%是在素材库里翻滚、组合、打磨的过程。", "example": "一个5分钟的脱口秀段子可能需要50小时的前期吐槽和素材积累。观众看到的只是最后精选出来的那个版本。", "keywords": ["行动力", "以输出学"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-passion-is-skill", "point": "热情其实是一种能力，不是情绪，可以通过训练获得。", "explanation": "不是\"我有热情所以我做得好\"，而是\"我不断做直到我有热情\"。李诞观察到很多口才好的人有股\"想把勺子怼到对方嘴里\"的热情——这是通过长期的表达训练获得的。", "example": "初出茅庐的脱口秀演员看起来冷漠木讷，因为他们还没建立起表达的习惯。训练6个月后，他们会自然地变得热情，因为表达成了本能。", "keywords": ["习惯系统", "以输出学"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-core-secret-training", "point": "脱口秀的核心秘密就是不断的训练，没有快速通道。", "explanation": "没有人天生就会讲笑话。所有的高手都是在各种小舞台上反复演练、失败、调整、再演练的结果。这适用于所有创意领域。", "example": "一个成熟的脱口秀演员可能有500场演出经验，每场都是即时反馈和改进的机会。", "keywords": ["即时反馈", "深度学习"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-learning-through-output", "point": "学一流，模仿二流，成为三流——这个悖论反映输出学的本质。", "explanation": "你看再多的教程和案例分析（学一流），模仿别人的方法（模仿二流），结果往往是自己的版本是个四不像（成为三流）。但这个三流的版本有价值——它是你自己的。有了自己的版本后，下一轮才能真正进步。", "example": "学喜剧写作的新手会看罗德尼·丹杰菲尔德和乔治·卡林的视频，然后模仿他们的节奏和用词，结果说出来就像一个廉价复制品。但继续这样\"三流\"下去，最终会找到自己的风格。", "keywords": ["身份认同", "深度学习"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-output-priority", "point": "先完成再完美是创意工作的终极法则。", "explanation": "完美主义是创意工作的毒药。不要在脑子里打磨10个小时才说出一句话，而是说出不完美的版本，通过观众反应来调整。实际效果反馈比内部想象靠谱100倍。", "example": "脱口秀演员可能在舞台上试一个新笑点，观众没反应，下周就删掉；再加一个新的。这样每周都在迭代，而不是在后台纠结一个月。", "keywords": ["即时反馈", "以输出学"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-content-selection", "point": "要从生活中有意识地挖掘和记录素材，建立个人素材库。", "explanation": "不是等灵感来敲门，而是主动在生活中扫描有趣的矛盾、荒谬的现象、人性的碰撞。有意识的观察比坐着冥想有效一万倍。", "example": "听人吐槽职场、家庭、感情，记下那些最频繁出现的怨言和笑点，这就是最贴近观众的素材。", "keywords": ["表达需求", "内在觉察"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-performance-focus", "point": "表演的核心是关注自己而不是讨好观众——强者吸引弱者。", "explanation": "新手的通病是看观众反应来调整，结果越来越讨好。成熟的表演者只专注于自己的质量和真实，观众的反应自然会来。这不是自大，而是一种能量转移——投入自己的人散发的能量会吸引他人。", "example": "一个演员紧盯观众想让他们笑，反而显得谄媚；一个演员专注于自己的表达有真实感，观众反而被吸引。", "keywords": ["自我选择", "表达需求"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-emotion-as-weapon", "point": "情绪可以是武器，但要心知肚明它会伤害自己，最终要戒掉。", "explanation": "初入职场的人微言轻时，眼泪和怒火可能是仅有的表达方式。这些情绪在短期内可能获得同情和让步，但长期来看这是对自己的伤害。需要尽早学会用理性和能力代替情绪。", "example": "职场新人可能会因为委屈而哭或发火，确实能获得上司的退让。但如果持续这样，就失去了建立职业能力和威信的机会。", "keywords": ["自我选择", "情绪表达"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-real-connection", "point": "做自媒体如果是抱着\"起号\"心态当工作，很快会失去乐趣和精力。", "explanation": "最可持续的内容创作来自真实的分享欲，而不是功利心。一旦变成KPI考核，创作就变成了负担。应该是有想和大家分享的东西，然后去分享。", "example": "抖音博主如果每天为了完成发布任务而勉强创作，最终要么内容质量下降，要么本人精力耗尽。而那些真心想分享的人反而能持续输出。", "keywords": ["意义感", "贡献感"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-stillness-in-struggle", "point": "人在溺水时总要扑腾两下，但保持不动的话人是会浮起来的。", "explanation": "对于陷入困境的人来说，这是个悖论性的建议。过度的行动和焦虑有时反而加重下沉。有时候停下来、冷静思考、等待，反而比拼命努力更有效。但这个建议仅对衣食无忧的人成立。", "example": "项目停滞时不要盲目加班，而是停下来审视方向是否错了。职业瓶颈时不要急于跳槽，而是思考真正的瓶颈是什么。", "keywords": ["活在当下", "内在觉察"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-method-plus-ambition", "point": "成功 = 工作方法 × 工作野心 × 正确态度，三者缺一不可。", "explanation": "只有方法没有野心会导致执行力消退；有野心没方法会导致瞎忙；有野心和方法但态度不对（比如不尊重行业），最终也会失败。", "example": "某个写手有完整的创作方法（系统化构思），有上升心（想成为一流作者），但态度上瞧不起粉丝反馈，最后反而被超越他的人打败。", "keywords": ["行动力", "心智成熟"], "bookId": "talk-show-work-manual"}, {"id": "talk-show-manual-pitch-persuasion", "point": "前采嘉宾的本质是想出能说服人的梗，而不是单纯搜集素材。", "explanation": "脱口秀的前期采访（pitch）不是采访而是创作。你需要和嘉宾互动中找到\"啊哈\"时刻，那个他没想到但说出来特别有趣的角度。这个过程是创意协作，不是问卷调查。", "example": "问嘉宾\"你离婚了\"只是事实，但挖出\"为什么你会选择那个看似完全相反的对象\"这个矛盾才是梗的金矿。", "keywords": ["沟通技巧", "深度学习"], "bookId": "talk-show-work-manual"}, {"id": "highly-sensitive-hsp-definition", "point": "高敏感（HSP）是一种神经生物学特质，约15-20%的人天生具有。", "explanation": "高敏感人士拥有更活跃的神经系统，对刺激的处理更深入。这不是心理问题也不是缺陷，而是一种不同的感知方式。武田友纪本身就是高敏感人士，写这本书就是从内部视角出发。", "example": "高敏感人士能察觉到他人细微的语气变化和情绪，会因为一句话反思很久，能发现环境中的微小美好（光影、声音、气味）。", "keywords": ["共情", "活在当下"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-four-traits", "point": "高敏感的四大核心特征：深度思考、易受刺激、强共情、细节感知。", "explanation": "深度思考让高敏感者能看到问题的复杂性和多维度；易受刺激意味着环境噪音、混乱、冲突对他们冲击很大；强共情使他们能察觉和承载他人情绪；细节感知让他们能发现别人忽视的美和问题。", "example": "一个普通人听上司的批评后\"好的，下次改进\"就过了；高敏感者会反思一整天这句话的含义、语气背后的情感、这是否意味着自己不适合这份工作等。", "keywords": ["共情", "内在觉察"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-misunderstanding", "point": "高敏感常被误诊为抑郁、焦虑或神经质，但其实是正常的神经变异。", "explanation": "不是所有敏感都是病。有些高敏感者被误诊为精神疾病而接受不必要的治疗，反而加重了自我否定。理解高敏感是第一步。", "example": "一个高敏感的孩子在学校里因为对批评反应强烈被认为是\"心理脆弱\"需要治疗，但其实只是需要更温和的反馈方式。", "keywords": ["边界感", "自我选择"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-deep-thinking", "point": "深度思考是高敏感者最大的资产——能看到他人看不到的联系和深层含义。", "explanation": "高敏感者习惯于反思和内化信息，这让他们在需要洞察力的工作（研究、设计、心理咨询、写作）中表现出色。不是弱点，是力量。", "example": "一个高敏感的设计师能察觉到色彩组合如何唤起特定情绪；一个高敏感的作家能写出触动人心的细节描写。", "keywords": ["深度学习", "内在觉察"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-strong-empathy", "point": "共情能力强让高敏感者成为天生的治愈者和倾听者。", "explanation": "高敏感者能感受他人的情绪和需要，这使他们成为优秀的心理咨询师、医生、父母或朋友。他们的存在本身就能给人带来安心感。", "example": "一个高敏感的朋友不需要你说多少，就能感受到你的难受，这种陪伴的力量是独特的。", "keywords": ["共情", "贡献感"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-detail-perception", "point": "对细节的敏锐感知让高敏感者能发现美、发现问题、发现机会。", "explanation": "当别人走过时没看到的小细节——一朵花、一句话的弦外之音、项目中的隐患——高敏感者都能察觉。这在质量控制、艺术、人际敏感度上是巨大优势。", "example": "高敏感的质检员能找到别人漏掉的缺陷；高敏感的摄影师能捕捉到独特的光影瞬间。", "keywords": ["以输出学", "内在觉察"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-stimulus-curation", "point": "高敏感者需要主动筛选生活中的刺激，创造\"心动清单\"而非被动接收。", "explanation": "不是逃避世界，而是有意识地选择哪些刺激进入生活。这包括人际关系、信息源、工作环境、娱乐方式。高敏感者的幸福度和普通人一样，但需要更好的环境设计。", "example": "高敏感者可能需要一个安静的工作环境而不是开放式办公室；可能需要限制社交而不是频繁聚会；可能需要避免过度的新闻轰炸而设置固定浏览时间。", "keywords": ["边界感", "自我选择"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-boundary-setting", "point": "建立清晰的边界是高敏感者保护自己的必要手段，不是冷漠是自卫。", "explanation": "高敏感者容易被他人的情绪淹没。说\"不\"、拒绝不合适的邀请、离开令人不适的环境——这些不是自私，而是必要的心理保护。没有边界的高敏感者会被持续消耗。", "example": "高敏感的人很难拒绝朋友的倾诉，但无限度地接纳他人情绪会导致自己过载。设置边界（比如\"每周一次倾诉时间，限30分钟\"）是健康的。", "keywords": ["边界感", "自我选择"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-solitude-value", "point": "独处不是孤独而是必需的能量恢复和深思的时间。", "explanation": "高敏感者在社交和刺激中快速耗能，需要足够的独处时间来恢复。这不是社交恐惧，是生理需求。允许自己独处就像允许自己睡眠一样重要。", "example": "一个高敏感的人参加了一场8小时的工作会议可能需要整个周末来恢复。这不是懒惰或抑郁，而是需要\"充电\"。", "keywords": ["活在当下", "孤独"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-six-types-happiness", "point": "高敏感者体验到的六种独特的幸福：富于感受、直觉敏锐、深思、善表达、有责任感、共情。", "explanation": "这些品质让高敏感者能更深刻地体验生活的美好。一个温暖的拥抱、一首音乐、一句鼓励——这些都能给高敏感者带来深度的喜悦。", "example": "普通人可能听音乐就是放松，高敏感者能从音乐中听到作曲家的情感故事和每个音符的细微变化，体验更深层的共鸣。", "keywords": ["活在当下", "意义感"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-self-acceptance", "point": "幸福的根基不在于改变自己的敏感性，而在于接纳和珍视它。", "explanation": "许多高敏感者花一生的时间试图\"变得不敏感\"，这本身就是高代价的。一旦接纳自己的特质，反而能找到适合自己的生活方式和工作，真正获得幸福。", "example": "一个高敏感者放弃了竞争激烈的投资银行工作，转向教书，虽然收入下降但生活质量大幅提升。这就是通过接纳而非对抗获得的幸福。", "keywords": ["身份认同", "自我选择"], "bookId": "highly-sensitive-person-happiness"}, {"id": "highly-sensitive-connection", "point": "高敏感者的真实自我是一份礼物，分享它能建立最深度的人际连接。", "explanation": "高敏感者如果隐藏自己的敏感、试图伪装成普通人，会丧失建立深度关系的机会。反而真实地展现自己（包括脆弱和敏感）能吸引理解他们的人。", "example": "一个高敏感者在约会中坦诚说\"我需要独处来恢复能量\"而不是隐瞒，反而能吸引那些尊重这种需求的伴侣，建立更稳定的关系。", "keywords": ["共情", "贡献感"], "bookId": "highly-sensitive-person-happiness"}], "edges": [{"source": "courage-unhappiness-is-chosen", "target": "maybe-courage-is-vulnerability", "relation": "都在探讨「自我选择」", "keyword": "自我选择"}, {"source": "courage-unhappiness-is-chosen", "target": "toad-responsibility-and-choice", "relation": "都在探讨「自我选择」", "keyword": "自我选择"}, {"source": "maybe-courage-is-vulnerability", "target": "toad-responsibility-and-choice", "relation": "都在探讨「自我选择」", "keyword": "自我选择"}, {"source": "maybe-courage-is-vulnerability", "target": "ah_habit_identity", "relation": "都在探讨「自我选择」", "keyword": "自我选择"}, {"source": "toad-responsibility-and-choice", "target": "ah_habit_identity", "relation": "都在探讨「自我选择」", "ke // ===== BOOK INDEX =====
const bookMap = {};
DATA.books.forEach(b => bookMap[b.bookId] = b);

// ===== RENDER SHELF =====
function renderShelf() {
  const grid = document.createElement('div');
  grid.className = 'book-grid';
  DATA.books.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    const catLabel = book.category === 'psychology' ? '心理学' : '个人成长';
    const badgeCls = book.category === 'psychology' ? 'badge-psychology' : 'badge-growth';
    const tagCls = book.category === 'psychology' ? 'tag-psychology' : 'tag-growth';
    card.innerHTML = `
      <span class="category-badge ${badgeCls}">${catLabel}</span>
      <h3>${book.title}</h3>
      <div class="author">${book.author}</div>
      <div class="verdict">${book.verdict}</div>
      <div class="tags">
        ${(book.tags || []).map(t => `<span class="tag ${tagCls}">${t}</span>`).join('')}
      </div>
    `;
    card.addEventListener('click', () => openBook(book));
    grid.appendChild(card);
  });
  document.getElementById('tab-shelf').innerHTML = '';
  document.getElementById('tab-shelf').appendChild(grid);
}

// ===== BOOK MODAL =====
function openBook(book) {
  const catLabel = book.category === 'psychology' ? '🧠 心理学' : '🌱 个人成长';
  let html = '';

  // Cover section
  html += `<section class="book-section cover-section">
    <div class="section-label">${catLabel}</div>
    <h1 class="book-title">${book.title}</h1>
    <div class="book-author">${book.author}</div>
    <div class="book-verdict">${book.verdict}</div>
    <div class="book-tags">${(book.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  </section>`;

  // Highlights
  html += `<section class="book-section highlights-section">
    <div class="b-section-label">全书高光 HIGHLIGHTS</div>
    <div class="highlights-content">${book.highlights||''}</div>
  </section>`;

  // Chapters
  (book.chapters||[]).forEach(ch => {
    html += `<section class="book-section chapter-section">
      <div class="chapter-name">${ch.chapterName}</div>`;
    (ch.insights||[]).forEach(ins => {
      const kwHtml = (ins.keywords||[]).map(k=>`<span class="kw">${k}</span>`).join('');
      html += `<div class="insight-block">
        <div class="insight-point">${ins.point}</div>
        <div class="insight-explanation">${ins.explanation}</div>
        ${ins.example ? `<div class="insight-example">🌰 ${ins.example}</div>` : ''}
        <div class="insight-keywords">${kwHtml}</div>
      </div>`;
    });
    html += '</section>';
  });

  // End
  html += `<section class="book-section end-section"><div class="end-emoji">📖</div></section>`;

  // Set content and open
  document.getElementById('bookScrollContent').innerHTML = html;
  document.getElementById('bookModal').classList.add('open');
  document.getElementById('bookScrollContent').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeBook() {
  document.getElementById('bookModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').onclick = closeBook;
document.getElementById('bookModal').addEventListener('click', e => {
  if (e.target === document.getElementById('bookModal')) closeBook();
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (!document.getElementById('bookModal').classList.contains('open')) return;
  if (e.key === 'Escape') closeBook();
});

// ===== TAB SWITCHING =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'network' && !networkInit) initNetwork();
  });
});

// ===== NETWORK =====
let networkInit = false;

function initNetwork() {
  networkInit = true;

  // Build keyword nodes
  const kwMap = {};
  DATA.insights.forEach(ins => {
    const book = bookMap[ins.bookId];
    if (!book) return;
    (ins.keywords || []).forEach(kw => {
      if (!kwMap[kw]) kwMap[kw] = { keyword: kw, books: new Set(), insights: [], categories: [] };
      kwMap[kw].books.add(ins.bookId);
      kwMap[kw].insights.push(ins);
      kwMap[kw].categories.push(book.category);
    });
  });

  const nodes = Object.values(kwMap).map(n => {
    const psyCount = n.categories.filter(c => c === 'psychology').length;
    const growCount = n.categories.filter(c => c === 'growth').length;
    let color;
    if (psyCount > 0 && growCount > 0) {
      color = psyCount > growCount ? '#2B7FD8' : growCount > psyCount ? '#F4D758' : '#8FBAE6';
    } else if (psyCount > 0) {
      color = '#2B7FD8';
    } else {
      color = '#F4D758';
    }
    const bookArr = [...n.books];
    let sourceLabel = bookArr.slice(0, 2).map(id => {
      const bk = bookMap[id];
      return bk ? bk.title.replace(/[《》]/g, '') : id;
    }).join('、');
    if (bookArr.length > 2) sourceLabel += ` +${bookArr.length - 2}`;
    return {
      id: n.keyword,
      radius: Math.max(12, Math.min(30, 8 + n.insights.length * 3)),
      color,
      sourceLabel,
      insights: n.insights,
      books: bookArr
    };
  });

  // Build links: co-occurring keywords in same insight
  const nodeIds = new Set(nodes.map(n => n.id));
  const linkSet = new Set();
  const links = [];

  DATA.insights.forEach(ins => {
    const kws = (ins.keywords || []).filter(k => nodeIds.has(k));
    for (let i = 0; i < kws.length; i++) {
      for (let j = i + 1; j < kws.length; j++) {
        const key = [kws[i], kws[j]].sort().join('||');
        if (!linkSet.has(key)) {
          linkSet.add(key);
          links.push({ source: kws[i], target: kws[j], relation: `共现于: ${bookMap[ins.bookId]?.title || ins.bookId}` });
        }
      }
    }
  });

  // Add cross-book links from DATA.edges
  DATA.edges.forEach(e => {
    const srcIns = DATA.insights.find(i => i.id === e.source);
    const tgtIns = DATA.insights.find(i => i.id === e.target);
    if (srcIns && tgtIns) {
      const srcKws = (srcIns.keywords || []).filter(k => nodeIds.has(k));
      const tgtKws = (tgtIns.keywords || []).filter(k => nodeIds.has(k));
      srcKws.forEach(sk => {
        tgtKws.forEach(tk => {
          if (sk !== tk) {
            const key = [sk, tk].sort().join('||');
            if (!linkSet.has(key)) {
              linkSet.add(key);
              links.push({ source: sk, target: tk, relation: e.relation });
            }
          }
        });
      });
    }
  });

  const container = document.querySelector('.network-container');
  const width = container.clientWidth;
  const height = Math.max(600, window.innerHeight - 140);

  const svg = d3.select('.network-svg')
    .attr('width', width)
    .attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

  svg.selectAll('*').remove();

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(120))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => d.radius + 12))
    .force('x', d3.forceX(width / 2).strength(0.02))
    .force('y', d3.forceY(height / 2).strength(0.02));

  const linkG = svg.append('g');
  const nodeG = svg.append('g');

  const linkEls = linkG.selectAll('line')
    .data(links).join('line')
    .attr('stroke', '#ccc')
    .attr('stroke-width', 1)
    .attr('stroke-dasharray', '4,4')
    .attr('opacity', 0.5);

  const nodeGroups = nodeG.selectAll('g')
    .data(nodes).join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragged)
      .on('end', dragEnd));

  nodeGroups.append('circle')
    .attr('r', d => d.radius)
    .attr('fill', d => d.color)
    .attr('stroke', '#fff')
    .attr('stroke-width', 2)
    .attr('opacity', 0.85);

  nodeGroups.append('text')
    .text(d => d.id)
    .attr('text-anchor', 'middle')
    .attr('dy', d => d.radius + 16)
    .attr('font-size', 13)
    .attr('font-weight', 500)
    .attr('fill', '#333')
    .attr('font-family', "'Noto Sans SC', sans-serif");

  nodeGroups.append('text')
    .text(d => d.sourceLabel)
    .attr('text-anchor', 'middle')
    .attr('dy', d => d.radius + 32)
    .attr('font-size', 10)
    .attr('fill', '#999')
    .attr('font-family', "'Noto Sans SC', sans-serif");

  // Edge hover tooltip
  const tooltip = document.getElementById('edgeTooltip');
  linkEls
    .on('mouseover', (event, d) => {
      tooltip.style.display = 'block';
      tooltip.textContent = d.relation;
      tooltip.style.left = event.clientX + 12 + 'px';
      tooltip.style.top = event.clientY - 10 + 'px';
    })
    .on('mousemove', event => {
      tooltip.style.left = event.clientX + 12 + 'px';
      tooltip.style.top = event.clientY - 10 + 'px';
    })
    .on('mouseout', () => {
      tooltip.style.display = 'none';
    });

  // Node click -> popup
  nodeGroups.on('click', (event, d) => {
    event.stopPropagation();
    const popup = document.getElementById('kwPopup');
    document.getElementById('kwPopupTitle').textContent = '🔑 ' + d.id;
    let html = '';
    d.insights.forEach(ins => {
      const bk = bookMap[ins.bookId];
      const bookTitle = bk ? bk.title : ins.bookId;
      html += `<div class="kw-insight">
        <div class="kw-point">${ins.point}</div>
        <div class="kw-source"><a href="#" class="book-link" data-book-id="${ins.bookId}" style="color:var(--blue);text-decoration:none;cursor:pointer">📚 ${bookTitle} →</a></div>
      </div>`;
    });
    document.getElementById('kwPopupBody').innerHTML = html;
    // Add click handlers for book links
    document.querySelectorAll('#kwPopupBody .book-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const bookId = e.currentTarget.dataset.bookId;
        const book = DATA.books.find(b => b.bookId === bookId);
        if (book) {
          document.getElementById('kwPopup').classList.remove('open');
          // Switch to shelf tab
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelector('[data-tab="shelf"]').classList.add('active');
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          document.getElementById('tab-shelf').classList.add('active');
          // Open the book
          openBook(book);
        }
      });
    });
    popup.classList.add('open');
    const x = Math.min(event.clientX, window.innerWidth - 440);
    const y = Math.min(event.clientY, window.innerHeight - 300);
    popup.style.left = x + 'px';
    popup.style.top = y + 'px';
  });

  document.getElementById('kwPopupClose').onclick = () => {
    document.getElementById('kwPopup').classList.remove('open');
  };
  document.addEventListener('click', e => {
    if (!document.getElementById('kwPopup').contains(e.target)) {
      document.getElementById('kwPopup').classList.remove('open');
    }
  });

  // Highlight connected nodes on hover
  nodeGroups
    .on('mouseover', function(event, d) {
      nodeGroups.attr('opacity', n => {
        if (n.id === d.id) return 1;
        const connected = links.some(l =>
          (l.source.id === d.id && l.target.id === n.id) ||
          (l.target.id === d.id && l.source.id === n.id)
        );
        return connected ? 1 : 0.2;
      });
      linkEls
        .attr('opacity', l => (l.source.id === d.id || l.target.id === d.id) ? 0.8 : 0.08)
        .attr('stroke', l => (l.source.id === d.id || l.target.id === d.id) ? '#F4D758' : '#ccc')
        .attr('stroke-width', l => (l.source.id === d.id || l.target.id === d.id) ? 2 : 1);
    })
    .on('mouseout', function() {
      nodeGroups.attr('opacity', 1);
      linkEls.attr('opacity', 0.5).attr('stroke', '#ccc').attr('stroke-width', 1);
    });

  simulation.on('tick', () => {
    // Clamp nodes within viewBox
    const pad = 40;
    nodes.forEach(d => {
      d.x = Math.max(pad, Math.min(width - pad, d.x));
      d.y = Math.max(pad, Math.min(height - pad, d.y));
    });
    linkEls
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    nodeGroups.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function dragStart(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
  function dragEnd(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }

  // Resize handler
  window.addEventListener('resize', () => {
    if (!document.getElementById('tab-network').classList.contains('active')) return;
    const w = container.clientWidth;
    const h = Math.max(600, window.innerHeight - 140);
    svg.attr('width', w).attr('height', h).attr('viewBox', `0 0 ${w} ${h}`);
    simulation.force('center', d3.forceCenter(w / 2, h / 2));
    simulation.force('x', d3.forceX(w / 2).strength(0.02));
    simulation.force('y', d3.forceY(h / 2).strength(0.02));
    simulation.alpha(0.3).restart();
  });
}

// ===== INIT =====
renderShelf();
</script>
</body>
</html>
