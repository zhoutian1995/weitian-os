<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 这页走丢了 | ESTHER不二</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,400;1,900&family=Caveat:wght@700&family=Noto+Serif+SC:wght@900&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cream: #fefcf6;
  --ink: #1A1A2E;
  --ink-light: #4A4A5A;
  --blue: #2B7FD8;
  --yellow: #F4D758;
  --red: #E84A5F;
}
::selection { background: var(--yellow); color: var(--ink); }
body {
  font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background-image: radial-gradient(circle at 80% 20%, rgba(244,215,88,0.18), transparent 40%);
}
.wrap { text-align: left; max-width: 560px; position: relative; }
.big404 {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 900;
  font-size: clamp(6rem, 20vw, 12rem);
  line-height: 1;
  color: var(--blue);
  opacity: 0.15;
  position: absolute;
  top: -0.55em;
  right: -0.1em;
  z-index: 0;
  user-select: none;
}
h1 {
  font-family: 'Noto Serif SC', serif;
  font-weight: 900;
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  position: relative;
  z-index: 1;
}
h1 mark {
  background: linear-gradient(transparent 62%, var(--yellow) 62%);
  color: inherit;
}
.note {
  font-family: 'Caveat', cursive;
  font-size: 1.4rem;
  color: var(--red);
  margin-top: 14px;
  transform: rotate(-1.5deg);
}
p.desc { color: var(--ink-light); margin-top: 18px; font-size: 0.95rem; line-height: 1.8; }
a.home {
  display: inline-block;
  margin-top: 32px;
  font-weight: 500;
  color: var(--ink);
  text-decoration: none;
  border-bottom: 3px solid var(--yellow);
  padding-bottom: 2px;
}
a.home:hover { background: var(--yellow); }
</style>
</head>
<body>
<div class="wrap">
  <div class="big404">404</div>
  <h1>这一页<mark>走丢了</mark></h1>
  <div class="note">maybe it's off building something with Cola…</div>
  <p class="desc">你要找的页面不在这里。可能是链接旧了，也可能是我把它搬走了。</p>
  <a class="home" href="/">← 回到 hiesther.me 首页</a>
</div>
</body>
</html>
